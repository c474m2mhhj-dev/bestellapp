/* ══════════════════════════════════════════════
   STORAGE
   Shared backend for cross-device sync (orders → kitchen,
   products, announcements, accounts & Bestellpunkte).

   Priority:  1) Supabase REST backend (BACKEND below)
              2) window.storage (Claude preview sandbox)
              3) localStorage only (offline / single device)

   To go live across devices: create a free Supabase project,
   run the SQL in BACKEND_SETUP.md, then paste url + anon key here.
══════════════════════════════════════════════ */
const BACKEND = {
  url: "https://gxjiuysiodkloowaecws.supabase.co",   // Supabase Project URL
  key: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd4aml1eXNpb2RrbG9vd2FlY3dzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NjczMTAsImV4cCI6MjA5NzQ0MzMxMH0.sjKKPPH737IP7DLTe-ObZQBPj8pP1K44tHe_bpwdz6o",   // anon/public key (mit RLS unbedenklich im Client)
};
const hasRemote = !!(BACKEND.url && BACKEND.key);
const hasSt = typeof window!=="undefined" && typeof window.storage!=="undefined";

/* Supabase PostgREST adapter over a single kv(key,shared,value) table */
const sbHead = ()=>({apikey:BACKEND.key,Authorization:"Bearer "+BACKEND.key,"Content-Type":"application/json"});
const sbUrl  = ()=>BACKEND.url.replace(/\/$/,"")+"/rest/v1/kv";
const sbBool = b=>b?"is.true":"is.false";
const Remote = {
  set: async(k,v,sh)=>{ await fetch(sbUrl(),{method:"POST",headers:{...sbHead(),Prefer:"resolution=merge-duplicates,return=minimal"},body:JSON.stringify({key:k,shared:!!sh,value:v,updated_at:new Date().toISOString()})}); },
  get: async(k,sh)=>{ const r=await fetch(sbUrl()+"?select=value&key=eq."+encodeURIComponent(k)+"&shared="+sbBool(sh),{headers:sbHead()}); if(!r.ok)return null; const a=await r.json(); return a.length?a[0].value:null; },
  list:async(p,sh)=>{ const r=await fetch(sbUrl()+"?select=key&shared="+sbBool(sh)+"&key=like."+encodeURIComponent(p)+"*",{headers:sbHead()}); if(!r.ok)return[]; const a=await r.json(); return a.map(x=>x.key); },
  del: async(k,sh)=>{ await fetch(sbUrl()+"?key=eq."+encodeURIComponent(k)+"&shared="+sbBool(sh),{method:"DELETE",headers:sbHead()}); },
  // Anzahl offener Bestellungen (new|making) – günstig per count-Header
  activeCount: async()=>{ try{ const r=await fetch(sbUrl()+"?select=key&shared=is.true&key=like.order_*&value->>status=in.(new,making)",{headers:{...sbHead(),Prefer:"count=exact",Range:"0-0"}}); const cr=r.headers.get("content-range")||""; const n=parseInt((cr.split("/")[1]||"").trim()); return isNaN(n)?0:n; }catch(e){ return 0; } },
};
const Db = {
  enabled: hasRemote || hasSt,
  set:  async(k,v,sh=false)=>{ try{ if(hasRemote)return await Remote.set(k,v,sh); if(hasSt)await window.storage.set(k,JSON.stringify(v),sh); }catch(e){} },
  get:  async(k,sh=false)  =>{ try{ if(hasRemote)return await Remote.get(k,sh); if(hasSt){const r=await window.storage.get(k,sh);return r?JSON.parse(r.value):null;} }catch(e){} return null; },
  list: async(p,sh=false)  =>{ try{ if(hasRemote)return await Remote.list(p,sh); if(hasSt){const r=await window.storage.list(p,sh);return r?r.keys:[];} }catch(e){} return []; },
  del:  async(k,sh=false)  =>{ try{ if(hasRemote)return await Remote.del(k,sh); if(hasSt)await window.storage.delete(k,sh); }catch(e){} },
  activeLoad: async()=>{ try{ if(hasRemote)return await Remote.activeCount(); const keys=hasSt?await Db.list("order_",true):LS.get("zr_all_orders",[]).map(id=>"zr_order_"+id); const os=await Promise.all(keys.map(k=>hasSt?Db.get(k,true):Promise.resolve(LS.get(k,null)))); return os.filter(o=>o&&(o.status==="new"||o.status==="making")).length; }catch(e){ return 0; } },
};
const LS = {
  get:(k,d=null)=>{ try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d} },
  set:(k,v)=>{ try{localStorage.setItem(k,JSON.stringify(v))}catch{} },
  del:(k)=>{ try{localStorage.removeItem(k)}catch{} },
};

function useToast(){
  const [toasts,set]=useState([]);
  const push=useCallback((msg,type="info",ms=2400)=>{
    const id=genId();
    set(p=>[...p,{id,msg,type}]);
    setTimeout(()=>set(p=>p.filter(t=>t.id!==id)),ms);
  },[]);
  return{toasts,push};
}

/* ══════════════════════════════════════════════
   SWIPE-TO-REMOVE hook
══════════════════════════════════════════════ */
function useSwipe(onRemove){
  const [dx,setDx]=useState(0);
  const startX=useRef(null);
  const onTStart=useCallback(e=>{startX.current=e.touches[0].clientX;},[]);
  const onTMove =useCallback(e=>{
    if(startX.current===null)return;
    const d=e.touches[0].clientX-startX.current;
    if(d<0) setDx(Math.max(d,-90));
  },[]);
  const onTEnd  =useCallback(()=>{
    if(dx<-60){onRemove();setDx(0);}
    else setDx(0);
    startX.current=null;
  },[dx,onRemove]);
  return{dx,onTStart,onTMove,onTEnd};
}

        {/* Compact hall picker */}
        <div style={{background:C.surface,borderRadius:DS.radius.md,boxShadow:DS.shadow.sm(dk),marginBottom:13,overflow:"hidden",border:!selTable?`1.5px solid ${dk?"rgba(77,182,169,.3)":C.light}`:"none"}}>

            <span style={{marginLeft:"auto",color:C.textLight,fontSize:12,transform:hallOpen?"rotate(180deg)":"none",transition:"transform .2s",display:"inline-block"}}>▾</span>
          </button>
          {hallOpen&&(
            <div style={{padding:"0 14px 14px"}}>
              <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
                {TABLES.map(t=>(
                  <button key={t} onClick={()=>{const sel=selTable!==t;setSelTable(sel?t:null);if(sel)setHallOpen(false);}} style={{padding:"10px 14px",borderRadius:DS.radius.sm,background:selTable===t?C.primary:C.surface2,color:selTable===t?"#fff":C.text,fontWeight:700,fontSize:13,border:"none",cursor:"pointer",boxShadow:selTable===t?DS.shadow.green(dk):"none"}}>{t}</button>

        {/* Compact "Wie funktioniert's?" — first visit only */}

            <button onClick={()=>setHowOpen(o=>!o)} style={{width:"100%",display:"flex",alignItems:"center",gap:9,padding:"11px 14px",background:"none",border:"none",cursor:"pointer"}}>

              <span style={{fontWeight:800,fontSize:13,color:C.text}}>Wie funktioniert's?</span>
              <span style={{marginLeft:"auto",display:"flex",gap:10,alignItems:"center"}}>
                <span onClick={e=>{e.stopPropagation();dismissIntro();}} style={{fontSize:11,fontWeight:700,color:C.textLight}}>Schließen</span>
                <span style={{color:C.textLight,fontSize:12,transform:howOpen?"rotate(180deg)":"none",transition:"transform .2s",display:"inline-block"}}>▾</span>
              </span>
            </button>
            {howOpen&&(
              <div style={{padding:"0 14px 14px"}}>
                {[["📍","Hörsaal wählen oder QR davor scannen"],["💳","Mit deinem Namen bestellen & bezahlen"],["🤖","Robert bringt's vor den Hörsaal – Push, wenn er da ist"]].map(([ic,t],i)=>(
                  <div key={i} style={{display:"flex",alignItems:"center",gap:10,marginBottom:i<2?9:11}}>
                    <span style={{fontSize:15,width:24,textAlign:"center",flexShrink:0}}>{ic}</span>

                <button onClick={dismissIntro} style={{width:"100%",padding:"9px",background:C.light,color:C.primary,borderRadius:DS.radius.sm,fontWeight:800,fontSize:13,border:"none",cursor:"pointer"}}>Verstanden ✓</button>
              </div>

        {/* QR shortcut is intentionally NOT shown here — QR codes live physically in
            front of each Hörsaal (scanning auto-selects it). Staff print them from Admin. */}

        {/* Sponsor / Event ad */}
        {ad&&ad.title&&<AdBanner ad={ad}/>}

        {/* Active orders card */}
        {activeOrds.length>0&&urgentOrd&&(()=>{const{icon,label,bg,cl}=ordInfo[urgentOrd.status]||ordInfo.new;
          const mins=urgentOrd.readyAt?Math.ceil((urgentOrd.readyAt-Date.now())/60000):null;
          const eta=urgentOrd.status==="ready"?(urgentOrd.mode==="pickup"?"🛍️ Abholbereit an der Theke":"🤖 Robert ist da – jetzt abholen"):(mins!=null&&mins>0?`Fertig in ~${mins} Min`:"Wird gleich fertig…");
          return(
          <button onClick={()=>go("orders")} style={{width:"100%",marginBottom:14,background:bg,borderRadius:DS.radius.md,padding:"13px 15px",display:"flex",alignItems:"center",gap:12,cursor:"pointer",border:"none",textAlign:"left",boxShadow:DS.shadow.xs(dk),animation:urgentOrd.status==="ready"?"pulse 1.8s ease-in-out infinite":undefined}}>
            <span style={{fontSize:24,flexShrink:0}}>{icon}</span>
            <div style={{flex:1,minWidth:0}}>
              <p style={{fontWeight:800,fontSize:13.5,color:cl,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{eta}</p>
              <p style={{fontSize:11,color:cl,opacity:.8,marginTop:1}}>{label} · {activeOrds.length} Bestellung{activeOrds.length!==1?"en":""}{urgentOrd.mode==="pickup"?"":" · "+urgentOrd.table}</p>
            </div>
            <span style={{flexShrink:0,fontWeight:800,fontSize:11,color:cl,background:dk?"rgba(255,255,255,.12)":"rgba(255,255,255,.55)",borderRadius:999,padding:"6px 11px",whiteSpace:"nowrap"}}>Live verfolgen →</span>
          </button>
        );})()}

        {/* Categories */}
        <p style={{fontWeight:800,fontSize:16,marginBottom:12,color:C.text}}>Kategorien</p>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:9,marginBottom:18}}>
          {CATS.filter(c=>c!=="Alle").map(c=>(
            <div key={c} onClick={()=>go("menu",c)} style={{background:C.surface,borderRadius:DS.radius.md,padding:"11px 8px",textAlign:"center",boxShadow:DS.shadow.sm(dk),cursor:"pointer",userSelect:"none",transition:"transform .12s"}}>
              <div style={{fontSize:22,marginBottom:4}}>{CICO[c]}</div>
              <p style={{fontSize:10,fontWeight:700,lineHeight:1.3,color:C.text}}>{c}</p>
            </div>
          ))}
        </div>

        {/* Tagesspecial */}
        {special&&(
          <div onClick={()=>go("detail",special)} style={{background:dk?"rgba(245,158,11,.1)":"#FFFBEB",border:`1.5px solid ${dk?"rgba(245,158,11,.35)":"#FDE68A"}`,borderRadius:DS.radius.lg,marginBottom:18,overflow:"hidden",cursor:"pointer",display:"flex",alignItems:"stretch",boxShadow:DS.shadow.md(dk)}}>
            <div style={{flex:1,padding:"13px 14px"}}>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
                <span style={{fontSize:13}}>🌟</span>
                <p style={{fontSize:10,fontWeight:800,letterSpacing:.8,textTransform:"uppercase",color:dk?"#FCD34D":"#B45309"}}>Tagesspecial</p>
              </div>
              <p style={{fontWeight:800,fontSize:15,color:C.text,lineHeight:1.3,marginBottom:4}}>{special.name}</p>
              {special.desc&&<p style={{fontSize:11,color:C.textMid,lineHeight:1.4,marginBottom:6}}>{special.desc}</p>}
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <p style={{fontWeight:800,fontSize:15,color:dk?"#FCD34D":"#B45309"}}>{special.sizes.length>1?"ab ":""}{fmt(special.sizes[0].p)}</p>
                <button onClick={e=>{e.stopPropagation();quickAdd(special,e);}} style={{padding:"5px 14px",borderRadius:DS.radius.full,background:dk?"rgba(245,158,11,.25)":"#FEF3C7",color:dk?"#FCD34D":"#92400E",fontSize:12,fontWeight:700,border:`1px solid ${dk?"rgba(245,158,11,.4)":"#FDE68A"}`,cursor:"pointer"}}>+ Hinzufügen</button>
              </div>
            </div>
            {special.img&&<div style={{width:110,flexShrink:0,position:"relative"}}><PImg src={special.img} alt={special.name} emoji={special.emoji} w={110} h="100%" style={{objectFit:"cover",height:"100%"}}/></div>}
            {!special.img&&<div style={{width:80,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:44}}>{special.emoji||"⭐"}</div>}
          </div>
        )}

        {/* Favoriten */}
        {favProds.length>0&&(
          <div style={{marginBottom:18}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <p style={{fontWeight:800,fontSize:16,color:C.text}}>♥ Deine Favoriten</p>
              <button onClick={()=>go("menu")} style={{color:C.primary,fontWeight:700,fontSize:13,background:"none",border:"none",cursor:"pointer",padding:"8px 6px",margin:"-8px -6px"}}>Alle →</button>
            </div>
            <div style={{display:"flex",gap:11,overflowX:"auto",scrollbarWidth:"none",margin:"0 -16px",paddingLeft:16,paddingRight:16,paddingBottom:4}}>
              {favProds.map(p=>(
                <div key={p.id} onClick={()=>go("detail",p)} style={{minWidth:126,flexShrink:0,background:C.surface,borderRadius:DS.radius.lg,overflow:"hidden",boxShadow:DS.shadow.sm(dk),cursor:"pointer"}}>
                  <PImg src={p.img} emoji={p.emoji} w={126} h={78}/>
                  <div style={{padding:"7px 9px 9px"}}>
                    <p style={{fontWeight:700,fontSize:12,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</p>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:3}}>
                      <p style={{fontSize:12,color:C.primary,fontWeight:700}}>{p.sizes.length>1?"ab ":""}{fmt(p.sizes[0].p)}</p>
                      <button onClick={e=>quickAdd(p,e)} style={{width:32,height:32,borderRadius:"50%",background:C.primary,color:"#fff",border:"none",cursor:"pointer",fontSize:17,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>+</button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Zuletzt bestellt */}
        {recentProds.length>0&&(
          <div style={{marginBottom:18}}>
            <p style={{fontWeight:800,fontSize:16,color:C.text,marginBottom:10}}>🕐 Zuletzt bestellt</p>
            <div style={{display:"flex",gap:11,overflowX:"auto",scrollbarWidth:"none",margin:"0 -16px",paddingLeft:16,paddingRight:16,paddingBottom:4}}>
              {recentProds.map(p=>(
                <div key={p.id} onClick={()=>go("detail",p)} style={{minWidth:126,flexShrink:0,background:C.surface,borderRadius:DS.radius.lg,overflow:"hidden",boxShadow:DS.shadow.sm(dk),cursor:"pointer"}}>
                  <PImg src={p.img} emoji={p.emoji} w={126} h={78}/>
                  <div style={{padding:"7px 9px 9px"}}>
                    <p style={{fontWeight:700,fontSize:12,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</p>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:3}}>
                      <p style={{fontSize:12,color:C.primary,fontWeight:700}}>{p.sizes.length>1?"ab ":""}{fmt(p.sizes[0].p)}</p>
                      <button onClick={e=>quickAdd(p,e)} style={{width:32,height:32,borderRadius:"50%",background:C.primary,color:"#fff",border:"none",cursor:"pointer",fontSize:17,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>+</button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Neuheiten */}
        {neu.length>0&&(
          <div style={{marginBottom:18}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <p style={{fontWeight:800,fontSize:16,color:C.text}}>🆕 Neuheiten</p>
              <button onClick={()=>go("menu")} style={{color:C.primary,fontWeight:700,fontSize:13,background:"none",border:"none",cursor:"pointer",padding:"8px 6px",margin:"-8px -6px"}}>Alle →</button>
            </div>
            <div style={{display:"flex",gap:12,overflowX:"auto",paddingBottom:8,scrollbarWidth:"none",margin:"0 -16px",paddingLeft:16,paddingRight:16}}>
              {neu.map(p=>(
                <div key={p.id} onClick={()=>go("detail",p)} style={{minWidth:148,background:C.surface,borderRadius:DS.radius.lg,overflow:"hidden",boxShadow:DS.shadow.md(dk),flexShrink:0,cursor:"pointer"}}>
                  <PImg src={p.img} alt={p.name} emoji={p.emoji} w="100%" h={94}/>
                  <div style={{padding:"9px 11px"}}>
                    <p style={{fontWeight:700,fontSize:12,lineHeight:1.3,color:C.text}}>{p.name}</p>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:4}}>
                      <p style={{fontWeight:800,color:C.primary,fontSize:13}}>{p.sizes.length>1?"ab ":""}{fmt(p.sizes[0].p)}</p>
                      <button onClick={e=>quickAdd(p,e)} style={{width:32,height:32,borderRadius:"50%",background:C.primary,color:"#fff",border:"none",cursor:"pointer",fontSize:17,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>+</button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
        {/* Popular — weather-aware (Dieburg) */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:12}}>
          <div>
            <p style={{fontWeight:800,fontSize:16,color:C.text}}>⭐ Beliebt heute</p>
            {temp!=null&&<p style={{fontSize:11,color:C.textLight,marginTop:2}}>{temp>=20?"☀️":temp<=11?"❄️":"⛅"} {Math.round(temp)}°C in Dieburg · {temp>=20?"Erfrischendes zuerst":temp<=11?"Wärmendes zuerst":"für jedes Wetter"}</p>}
          </div>
          <button onClick={()=>go("menu")} style={{color:C.primary,fontWeight:700,fontSize:13,background:"none",border:"none",cursor:"pointer",flexShrink:0,padding:"8px 6px",margin:"-8px -6px"}}>Alle →</button>
        </div>
        <div style={{display:"flex",gap:12,overflowX:"auto",paddingBottom:8,scrollbarWidth:"none",margin:"0 -16px",paddingLeft:16,paddingRight:16}}>
          {loading
            ?[...Array(4)].map((_,i)=><div key={i} style={{minWidth:148,background:C.surface,borderRadius:DS.radius.lg,overflow:"hidden",flexShrink:0}}><Skeleton w={148} h={94} r={0}/><div style={{padding:"9px 11px"}}><Skeleton w="60%" h={12} r={5} mb={6}/><Skeleton w="40%" h={12} r={5}/></div></div>)
            :pop.map(p=>(
              <div key={p.id} onClick={()=>go("detail",p)} style={{minWidth:148,background:C.surface,borderRadius:DS.radius.lg,overflow:"hidden",boxShadow:DS.shadow.md(dk),flexShrink:0,cursor:"pointer"}}>
                <PImg src={p.img} alt={p.name} emoji={p.emoji} w="100%" h={94}/>
                <div style={{padding:"9px 11px"}}>
                  <p style={{fontWeight:700,fontSize:12,lineHeight:1.3,color:C.text}}>{p.name}</p>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:4}}>
                    <p style={{fontWeight:800,color:C.primary,fontSize:13}}>{p.sizes.length>1?"ab ":""}{fmt(p.sizes[0].p)}</p>
                    <button onClick={e=>quickAdd(p,e)} style={{width:32,height:32,borderRadius:"50%",background:C.primary,color:"#fff",border:"none",cursor:"pointer",fontSize:17,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>+</button>
                  </div>
                </div>
              </div>
            ))
          }
        </div>

        {(()=>{const qty=cart.reduce((s,i)=>s+i.qty,0);return(
          <button onClick={()=>go(qty>0?"cart":"menu")} style={{width:"100%",marginTop:18,padding:15,background:`linear-gradient(135deg,${C.dark},${C.primary})`,color:"#fff",borderRadius:DS.radius.md,fontWeight:800,fontSize:15,border:"none",cursor:"pointer",boxShadow:DS.shadow.green(dk)}}>
            {qty>0?`🛒 Warenkorb ansehen · ${qty} Artikel →`:"Jetzt bestellen →"}
          </button>
        );})()}
      </div>
      <FloatCart/><BottomNav/>
    </Screen>
  );
}

function QRScreen(){
  const{go,selTable,darkMode:dk}=useApp();const C=useC();
  const[t,setT]=useState(selTable||"T1");
  const printAll=()=>{
    const base=typeof window!=="undefined"?window.location.href.split("?")[0]:"https://c474m2mhhj-dev.github.io/bestellapp";
    const qSrc=tb=>`https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=${encodeURIComponent(base+"?table="+encodeURIComponent(tb))}&margin=4&color=004D40`;
    const w=window.open("","_blank");
    w.document.write(`<!DOCTYPE html><html><head><title>QR-Codes zeitraum</title><style>*{box-sizing:border-box}body{margin:0;font-family:-apple-system,sans-serif;background:#fff}@media print{@page{margin:10mm;size:A4}}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;padding:20px}.card{text-align:center;border:2px solid #E0E0DA;border-radius:14px;padding:18px;break-inside:avoid}.card img{width:180px;height:180px}.card h2{font-size:20px;font-weight:800;color:#004D40;margin:10px 0 4px}.card p{font-size:10px;color:#999;font-family:monospace;word-break:break-all}</style></head><body><div class="grid">${TABLES.map(tb=>`<div class="card"><img src="${qSrc(tb)}" alt="${tb}"><h2>${tb}</h2><p>${base}?table=${tb}</p></div>`).join("")}</div><script>window.onload=()=>setTimeout(()=>window.print(),900);<\/script></body></html>`);
    w.document.close();
  };
  return(
    <Screen>
      <div style={{background:`linear-gradient(160deg,${C.heroFrom},${C.heroTo})`,padding:"50px 18px 28px",borderBottomLeftRadius:32,borderBottomRightRadius:32}}>
        <div style={{display:"flex",alignItems:"center",gap:11,marginBottom:16}}>
          <BackBtn onPress={()=>go("home")}/>
          <div>
            <p style={{color:"#fff",fontWeight:900,fontSize:19}}>QR-Codes für Hörsäle</p>
            <p style={{color:"rgba(255,255,255,.65)",fontSize:12,marginTop:1}}>Drucken &amp; vor dem jeweiligen Hörsaal aushängen</p>
          </div>
        </div>
      </div>
      <div style={{padding:"20px 16px 0"}}>
        <div style={{background:C.surface,borderRadius:DS.radius.lg,padding:16,boxShadow:DS.shadow.md(dk),marginBottom:16}}>
          <p style={{fontWeight:700,fontSize:14,marginBottom:11,color:C.text}}>Hörsaal auswählen</p>
          <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
            {TABLES.map(tb=><button key={tb} onClick={()=>setT(tb)} style={{padding:"8px 13px",borderRadius:DS.radius.sm,background:t===tb?C.primary:C.surface2,color:t===tb?"#fff":C.text,fontWeight:700,fontSize:13,border:"none",cursor:"pointer",transition:"all .15s",boxShadow:t===tb?DS.shadow.green(dk):"none"}}>{tb}</button>)}
          </div>
        </div>
        <div style={{background:C.surface,borderRadius:DS.radius.xl,padding:24,boxShadow:DS.shadow.md(dk),textAlign:"center",marginBottom:16}}>
          <div style={{display:"inline-block",padding:12,background:"#fff",borderRadius:DS.radius.lg,boxShadow:DS.shadow.sm(dk)}}>
            <QRWidget table={t} size={200}/>
          </div>
          <p style={{marginTop:16,fontWeight:800,fontSize:18,color:C.text}}>{t}</p>
          <p style={{color:C.textLight,fontSize:13,marginTop:4}}>Scan → Hörsaal automatisch erkannt</p>
          <div style={{marginTop:12,background:C.surface2,borderRadius:DS.radius.sm,padding:"9px 14px",display:"inline-block"}}>
            <code style={{fontSize:11,color:C.textMid}}>{(typeof window!=="undefined"?window.location.host+window.location.pathname.replace(/\/$/,""):"zeitraum.app")}?table={t}</code>

// Card helpers — Luhn check, brand detection, formatting
const luhnOk=(d)=>{let s=0,alt=false;for(let i=d.length-1;i>=0;i--){let x=+d[i];if(alt){x*=2;if(x>9)x-=9;}s+=x;alt=!alt;}return d.length>0&&s%10===0;};
const cardBrand=(d)=>{if(/^4/.test(d))return"Visa";if(/^3[47]/.test(d))return"Amex";if(/^5[1-5]/.test(d)||/^2[2-7]/.test(d))return"Mastercard";if(/^6/.test(d))return"Discover";return null;};
// Simulated issuer responses for known test cards
const DECLINES={"4000000000000002":"Karte abgelehnt – bitte andere Karte verwenden","4000000000009995":"Nicht genügend Guthaben","4000000000000069":"Karte ist abgelaufen","4000000000000127":"Falscher Sicherheitscode (CVC)"};
function BrandBadge({brand}){
  const m={Visa:["#1A1F71","VISA"],Mastercard:["#EB001B","MC"],Amex:["#2E77BC","AMEX"],Discover:["#E8731C","DISC"]}[brand];
  if(!m)return <span style={{fontSize:18,opacity:.5}}>💳</span>;
  return <span style={{background:m[0],color:"#fff",fontSize:10,fontWeight:900,letterSpacing:".05em",padding:"3px 6px",borderRadius:5}}>{m[1]}</span>;
}

/* ══════════════════════════════════════════════
   CART SCREEN
══════════════════════════════════════════════ */
function CartScreen(){
  const{go,prevScreen,cart,chQty,removeItem,clearCart,selTable,setSelTable,submitOrder,submitting,products,addToCart,ordersPaused,user,activeLoad,darkMode:dk}=useApp();const C=useC();
  const[undoItem,setUndoItem]=useState(null);
  const[payOpen,setPayOpen]=useState(false);
  const[useVoucher,setUseVoucher]=useState(false);
  const[mode,setMode]=useState(()=>LS.get("zr_mode","delivery"));
  const[cupType,setCupType]=useState(()=>LS.get("zr_cuptype","becher"));
  const[nameDraft,setNameDraft]=useState(()=>(user?.name||""));
  useEffect(()=>{LS.set("zr_mode",mode);},[mode]);
  useEffect(()=>{LS.set("zr_cuptype",cupType);},[cupType]);
  const isPickup=mode==="pickup";
  const undoRef=useRef(null);
  const handleRemove=useCallback((item)=>{clearTimeout(undoRef.current);setUndoItem({...item});removeItem(item.ck);undoRef.current=setTimeout(()=>setUndoItem(null),5000);},[removeItem]);
  const sub=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const del=isPickup?0:(sub>=FREE_ABOVE?0:DEL_FEE);
  const availVouchers=Math.floor((user?.points||0)/VOUCHER_AT)-(user?.vouchersUsed||0);
  const drinkPrices=cart.filter(i=>{const p=products.find(x=>x.id===i.id);return p&&DRINK_CATS.includes(p.cat);}).map(i=>i.price);
  const freeBase=drinkPrices.length?Math.max(...drinkPrices):0;
  const voucherActive=useVoucher&&availVouchers>0&&freeBase>0;
  const freeAmount=voucherActive?freeBase:0;
  const cupInfo=cupDeposit(cart,products,mode,cupType);
  const deposit=cupInfo.deposit;
  const[tip,setTip]=useState(0);
  const tot=Math.max(0,Math.round((sub+del+deposit+tip-freeAmount)*100)/100);
  const upsell=useMemo(()=>{
    const inCart=new Set(cart.map(i=>i.id));
    const cats=cart.map(i=>products.find(p=>p.id===i.id)?.cat).filter(Boolean);
    const FOOD_CATS=["Gebäck","Snacks"];
    const hasDrink=cats.some(c=>DRINK_CATS.includes(c));
    const hasFood=cats.some(c=>FOOD_CATS.includes(c));
    const avail=products.filter(p=>p.available&&!inCart.has(p.id));
    const byPop=arr=>arr.slice().sort((a,b)=>(b.pop?1:0)-(a.pop?1:0));
    // Pairing: drink in cart → suggest something to eat (never another drink); food but no drink → suggest a drink
    let pool;
    if(hasDrink) pool=avail.filter(p=>FOOD_CATS.includes(p.cat));
    else if(hasFood) pool=avail.filter(p=>DRINK_CATS.includes(p.cat));
    else pool=avail.filter(p=>p.pop);
    let res=byPop(pool).slice(0,3);
    if(res.length<3){ // top up with popular items, still avoiding another drink when a drink is in the cart
      const have=new Set(res.map(p=>p.id));
      res=[...res,...byPop(avail.filter(p=>p.pop&&!have.has(p.id)&&!(hasDrink&&DRINK_CATS.includes(p.cat)))).slice(0,3-res.length)];
    }
    return res.slice(0,3);
  },[cart,products]);
  const estWait=useMemo(()=>{
    const CAT_MIN={Kaltgetränke:1,Snacks:2,Gebäck:3,Sonstiges:2};
    const times=cart.map(it=>{const p=products.find(x=>x.id===it.id);return CAT_MIN[p?.cat]??5;});
    if(!times.length)return null;
    const base=Math.max(...times);
    const totalQty=cart.reduce((s,i)=>s+i.qty,0);
    const extra=totalQty>3?2:totalQty>1?1:0;
    return base+extra+loadExtraMin((activeLoad||0)+1);
  },[cart,products,activeLoad]);
  const load=loadInfo(activeLoad||0);
  const needsName=!nameDraft.trim();
  const needsTable=!isPickup&&!selTable;
  const cantPay=needsName||needsTable;
  const closed=!cafeStatus().open;
  const handlePay=async()=>{
    if(cantPay||submitting||ordersPaused||closed)return;

    <Screen>
      <div style={{background:`linear-gradient(135deg,${C.heroFrom},${C.heroTo})`,padding:"50px 18px 20px",borderBottomLeftRadius:28,borderBottomRightRadius:28}}>

          <BackBtn onPress={()=>go(prevScreen||"menu")}/>
          <div style={{flex:1}}>
            <p style={{color:"#fff",fontWeight:800,fontSize:17}}>Warenkorb</p>
            <p style={{color:"rgba(255,255,255,.65)",fontSize:12,marginTop:1}}>{isPickup?"🛍️ Selbstabholung":selTable?`📍 ${selTable}`:"⚠️ Kein Hörsaal"}</p>
          </div>
          {cart.length>0&&<button onClick={clearCart} aria-label="Warenkorb leeren" style={{background:"rgba(255,255,255,.15)",border:"1px solid rgba(255,255,255,.25)",borderRadius:DS.radius.sm,color:"#fff",padding:"9px 13px",fontSize:11,fontWeight:700,cursor:"pointer"}}>Leeren</button>}
        </div>
      </div>
      <div style={{padding:"14px 16px 0"}}>
        {cart.length===0&&(
          <div style={{textAlign:"center",padding:"60px 16px 120px"}}>
            <div style={{fontSize:50,marginBottom:14}}>🛒</div>
            <h3 style={{fontSize:17,fontWeight:800,marginBottom:16,color:C.text}}>Warenkorb ist leer</h3>
            <button onClick={()=>go("menu")} style={{padding:"12px 28px",background:C.primary,color:"#fff",border:"none",borderRadius:DS.radius.md,fontWeight:700,cursor:"pointer",fontSize:15}}>Zur Speisekarte</button>
          </div>

        {cart.map(item=>(
          <CartItem key={item.ck} item={item} onChQty={d=>{if(d===-1&&item.qty===1)handleRemove(item);else chQty(item.ck,d);}} onRemove={()=>handleRemove(item)}/>
        ))}
        {cart.length>0&&upsell.length>0&&(
          <div style={{marginBottom:9}}>
            <p style={{fontWeight:700,fontSize:13,color:C.text,marginBottom:8}}>✨ Das passt dazu</p>
            <div style={{display:"flex",gap:9,overflowX:"auto",scrollbarWidth:"none",margin:"0 -16px",paddingLeft:16,paddingRight:16,paddingBottom:4}}>
              {upsell.map(p=>(
                <div key={p.id} style={{minWidth:120,flexShrink:0,background:C.surface,borderRadius:DS.radius.md,overflow:"hidden",boxShadow:DS.shadow.sm(dk),cursor:"pointer"}} onClick={()=>go("detail",p)}>
                  <PImg src={p.img} emoji={p.emoji} w={120} h={72}/>
                  <div style={{padding:"6px 9px 9px"}}>
                    <p style={{fontWeight:700,fontSize:11,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</p>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:4}}>
                      <span style={{fontSize:11,fontWeight:800,color:C.primary}}>{fmt(p.sizes[0].p)}</span>
                      <button onClick={e=>{e.stopPropagation();addToCart({id:p.id,name:p.name,price:p.sizes[0].p,img:p.img,emoji:p.emoji,note:"",ck:`${p.id}||${p.sizes[0].p.toFixed(2)}`},1);}} style={{width:32,height:32,borderRadius:"50%",background:C.primary,color:"#fff",border:"none",cursor:"pointer",fontSize:17,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>+</button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
        {cart.length>0&&(
          <>
            {/* Name — orders are identified by name */}
            <div style={{background:C.surface,borderRadius:DS.radius.md,boxShadow:DS.shadow.sm(dk),padding:"12px 14px",marginBottom:9,border:needsName?`1.5px solid ${dk?C.amber+"66":"#FED7AA"}`:`1px solid ${C.border}`}}>

            {/* Free delivery progress */}
            {!isPickup&&sub<FREE_ABOVE&&(

            {availVouchers>0&&(
              <button onClick={()=>{if(freeBase>0)setUseVoucher(v=>!v);}} style={{width:"100%",textAlign:"left",background:voucherActive?(dk?"rgba(212,168,67,.16)":"#FFFBEB"):C.surface,border:`1.5px solid ${voucherActive?(dk?"rgba(212,168,67,.5)":"#FDE68A"):C.border}`,borderRadius:DS.radius.md,boxShadow:DS.shadow.xs(dk),padding:"12px 14px",marginBottom:9,display:"flex",alignItems:"center",gap:11,cursor:freeBase>0?"pointer":"default"}}>
                <span style={{fontSize:22,flexShrink:0}}>🎁</span>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{fontWeight:800,fontSize:13,color:dk?"#FCD34D":"#B45309"}}>Freigetränk einlösen</p>
                  <p style={{fontSize:11,color:C.textMid,marginTop:1}}>{freeBase>0?(voucherActive?`Dein teuerstes Getränk gratis · −${fmt(freeBase)}`:`${availVouchers} verfügbar · teuerstes Getränk gratis`):"Füge ein Getränk hinzu, um es einzulösen"}</p>
                </div>
                <div style={{width:46,height:27,borderRadius:14,background:voucherActive?C.primary:C.border,flexShrink:0,position:"relative",transition:"background .2s",opacity:freeBase>0?1:.5}}>
                  <div style={{position:"absolute",top:3,left:voucherActive?22:3,width:21,height:21,borderRadius:"50%",background:"#fff",transition:"left .2s",boxShadow:"0 1px 3px rgba(0,0,0,.3)"}}/>
                </div>
              </button>
            )}
            {/* Optionaler Soli-Beitrag */}
            <div style={{background:C.surface,borderRadius:DS.radius.md,boxShadow:DS.shadow.sm(dk),padding:"12px 14px",marginBottom:9}}>
              <p style={{fontWeight:700,fontSize:13,color:C.text}}>🤝 Café unterstützen? <span style={{fontWeight:400,fontSize:11,color:C.textLight}}>· optional</span></p>
              <p style={{fontSize:11,color:C.textLight,marginTop:1,marginBottom:9}}>Soli-Beitrag fürs studentische zeitraum-Team</p>
              <div style={{display:"flex",gap:7}}>
                {[["Nein",0],["+0,20",0.2],["+0,50",0.5],["+1,00",1]].map(([l,v])=>(
                  <button key={l} onClick={()=>setTip(v)} style={{flex:1,padding:"9px 4px",borderRadius:DS.radius.sm,fontSize:12,fontWeight:700,border:`1.5px solid ${tip===v?C.primary:C.border}`,background:tip===v?C.light:C.surface2,color:tip===v?C.primary:C.textMid,cursor:"pointer"}}>{l}</button>
                ))}
              </div>
            </div>
            <div style={{background:C.surface,borderRadius:DS.radius.md,boxShadow:DS.shadow.sm(dk),padding:15,marginBottom:9}}>
              {[["Zwischensumme",fmt(sub),C.text],["Servicegebühr",del===0?"Entfällt 🎉":fmt(del),del===0?C.primary:C.text],...(deposit>0?[[`♻️ Pfand (${cupInfo.type==="tasse"?"Tasse":"Becher"})`,fmt(deposit),C.text]]:[]),...(tip>0?[["🤝 Soli-Beitrag",fmt(tip),C.text]]:[]),...(freeAmount>0?[["🎁 Freigetränk","− "+fmt(freeAmount),C.primary]]:[])].map(([l,v,cl])=>(
                <div key={l} style={{display:"flex",justifyContent:"space-between",fontSize:13,color:C.textMid,marginBottom:7}}>
                  <span>{l}</span>
                  <span style={{fontWeight:600,color:cl}}>{v}</span>
                </div>
              ))}
              <div style={{borderTop:`1px solid ${C.border}`,paddingTop:9,display:"flex",justifyContent:"space-between",fontWeight:800,fontSize:17}}>
                <span style={{color:C.text}}>Gesamt</span><span style={{color:C.primary}}>{fmt(tot)}</span>
              </div>
            </div>
            {/* Kaffee-Stempel-Vorschau */}
            {(()=>{const earn=drinkStamps(cart,products);if(earn<1)return null;const before=user?.points||0;const after=before+earn;const unlocks=Math.floor(after/VOUCHER_AT)>Math.floor(before/VOUCHER_AT);const toNext=VOUCHER_AT-(after%VOUCHER_AT);return(
              <div style={{background:dk?"rgba(212,168,67,.12)":"#FFFBEB",border:`1.5px solid ${dk?"rgba(212,168,67,.3)":"#FDE68A"}`,borderRadius:DS.radius.md,padding:"11px 14px",marginBottom:9,display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:20,flexShrink:0}}>☕</span>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{fontWeight:800,fontSize:13,color:dk?"#FCD34D":"#B45309"}}>+{earn} Kaffee-Stempel für diese Bestellung</p>
                  <p style={{fontSize:11,color:dk?"#FCD34D":"#B45309",opacity:.85,marginTop:1}}>{unlocks?"🎁 Freigetränk freigeschaltet!":`Noch ${toNext} Getränk${toNext!==1?"e":""} bis zum Freigetränk`}</p>
                </div>
              </div>
            );})()}
            <div style={{background:load?(load.tone==="hot"?(dk?"rgba(239,68,68,.12)":"#FEF2F2"):(dk?"rgba(245,158,11,.12)":"#FFFBEB")):C.light,borderRadius:DS.radius.sm,padding:"11px 14px",marginBottom:18,display:"flex",alignItems:"center",gap:9}}>
              <span>{load?load.icon:"⏱"}</span>
              <div style={{flex:1}}>
                <p style={{fontWeight:700,fontSize:13,color:load?(load.tone==="hot"?(dk?"#FCA5A5":"#991B1B"):(dk?"#FCD34D":"#92400E")):C.dark}}>ca. {estWait} Min Zubereitungszeit</p>
                <p style={{fontSize:11,color:C.textMid}}>{load?`${load.label} · ${activeLoad} offene Bestellungen`:"Geschätzt · nach Bestätigung"}</p>
              </div>
            </div>
            {closed&&!ordersPaused&&<div style={{background:dk?"rgba(239,68,68,.12)":"#FEF2F2",border:`1.5px solid ${dk?"rgba(239,68,68,.3)":"#FECACA"}`,borderRadius:DS.radius.md,padding:"11px 14px",marginBottom:10,display:"flex",alignItems:"center",gap:9}}><span>🔴</span><p style={{fontSize:13,fontWeight:600,color:dk?"#FCA5A5":"#991B1B"}}>{cafeStatus().label} – Robert liefert nur während der Öffnungszeiten.</p></div>}
            {ordersPaused&&<div style={{background:dk?"rgba(239,68,68,.12)":"#FEF2F2",border:`1.5px solid ${dk?"rgba(239,68,68,.3)":"#FECACA"}`,borderRadius:DS.radius.md,padding:"11px 14px",marginBottom:10,display:"flex",alignItems:"center",gap:9}}><span>⏸</span><p style={{fontSize:13,fontWeight:600,color:dk?"#FCA5A5":"#991B1B"}}>Bestellungen momentan pausiert – bitte kurz warten!</p></div>}
            <button onClick={handlePay} disabled={cantPay||submitting||ordersPaused||closed} style={{width:"100%",padding:"18px",background:cantPay||submitting||ordersPaused||closed?C.border:`linear-gradient(135deg,${C.dark},${C.primary})`,color:cantPay||submitting||ordersPaused||closed?C.textLight:"#fff",borderRadius:DS.radius.lg,fontWeight:800,fontSize:17,border:"none",cursor:cantPay||submitting||ordersPaused||closed?"default":"pointer",boxShadow:!cantPay&&!submitting&&!ordersPaused&&!closed?DS.shadow.green(dk):"none",transition:"all .2s",letterSpacing:"0.01em",marginBottom:10}}>
              {submitting?"Wird gesendet…":closed?"Außerhalb der Öffnungszeiten":ordersPaused?"Bestellungen pausiert":needsName?"Bitte Namen eingeben":needsTable?"Bitte zuerst Hörsaal wählen":`💳 Bezahlen & Bestellen · ${fmt(tot)}`}

            <p style={{textAlign:"center",fontSize:11,color:C.textLight,marginBottom:32}}>Apple Pay · Google Pay · Kreditkarte</p>
          </>
        )}
      </div>
      {undoItem&&(
        <div style={{position:"fixed",bottom:72,left:"50%",transform:"translateX(-50%)",background:"#1A1A1A",color:"#fff",borderRadius:14,padding:"11px 14px",display:"flex",alignItems:"center",gap:12,zIndex:999,boxShadow:"0 8px 24px rgba(0,0,0,.35)",width:"min(92vw,360px)",animation:"tIn .25s cubic-bezier(.34,1.56,.64,1) both"}}>
          <p style={{flex:1,fontSize:13,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{undoItem.name} entfernt</p>

      )}
      {payOpen&&<PaymentSheet total={tot} items={cart} del={del} onClose={()=>setPayOpen(false)} onConfirm={async(pay)=>{await submitOrder("",{discount:freeAmount>0?freeAmount:0,mode,name:nameDraft.trim(),cupType,payment:pay,tip});setPayOpen(false);}}/>}
      <BottomNav/>
    </Screen>
  );
}

/* ══════════════════════════════════════════════
   ORDER TRACKING
══════════════════════════════════════════════ */
const STEPS=[
  {key:"new",    label:"Bestätigt",   icon:"✅",color:"#00695C"},
  {key:"making", label:"Zubereitung", icon:"👨‍🍳",color:"#F59E0B"},
  {key:"ready",  label:"Robert da",   icon:"🤖",color:"#2563EB"},
  {key:"done",   label:"Abgeholt ✓",  icon:"🎉",color:"#16A34A"},
];
function OrderCard({o}){
  const C=useC(),{darkMode:dk,addToCart,go,products}=useApp();
  const reorder=useCallback(()=>{
    o.items.forEach(it=>{
      const prod=products.find(p=>p.id===it.id)||products.find(p=>p.name===it.name);
      if(prod&&prod.available){const sz=prod.sizes.find(s=>s.l===it.size)||prod.sizes[0];for(let i=0;i<it.qty;i++)addToCart(prod,sz);}
    });
    go("cart");
  },[o,products,addToCart,go]);
  const isPickup=o.mode==="pickup";
  const steps=isPickup?STEPS.map(s=>s.key==="ready"?{...s,label:"Abholbereit",icon:"🛍️"}:s):STEPS;
  const si=Math.max(0,steps.findIndex(s=>s.key===o.status));
  const step=steps[si];
  const pct=(si/(steps.length-1))*100;
  return(
    <div style={{background:C.surface,borderRadius:DS.radius.xl,padding:16,marginBottom:12,boxShadow:DS.shadow.md(dk),animation:o.status==="ready"?"pulse 1.8s ease-in-out infinite":undefined}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:13}}>
        <div style={{flex:1}}>
          <p style={{fontWeight:800,fontSize:15,color:C.text}}>Bestellung {orderNo(o)}{o.customer?` · ${o.customer}`:""}</p>
          <p style={{fontSize:12,color:C.textLight,marginTop:2}}>{isPickup?"🛍️ Abholung":o.table} · {o.time}</p>
          {o.note&&<p style={{fontSize:11,background:C.surface2,borderRadius:7,padding:"3px 8px",marginTop:5,display:"inline-block",color:C.textMid}}>📝 {o.note}</p>}
        </div>
        <div style={{textAlign:"center",background:`${step.color}18`,borderRadius:14,padding:"9px 13px",flexShrink:0,marginLeft:11}}>
          <div style={{fontSize:22}}>{step.icon}</div>
          <div style={{fontSize:10,fontWeight:800,color:step.color,marginTop:3,whiteSpace:"nowrap"}}>{step.label}</div>
        </div>
      </div>
      {/* Gradient progress bar */}
      <div style={{marginBottom:10}}>
        <div style={{height:5,background:C.surface2,borderRadius:3,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${pct}%`,background:`linear-gradient(90deg,${steps[0].color},${step.color})`,borderRadius:3,transition:"width .8s ease"}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
          {steps.map((s,i)=><span key={s.key} style={{fontSize:9,fontWeight:700,color:si>=i?s.color:C.textLight,transition:"color .4s"}}>{s.label.split(" ")[0]}</span>)}
        </div>
      </div>
      {/* Dot stepper */}
      <div style={{display:"flex",alignItems:"center",marginBottom:11}}>
        {steps.map((s,i)=>(
          <div key={s.key} style={{display:"flex",alignItems:"center",flex:i<steps.length-1?1:"auto"}}>
            <div style={{width:24,height:24,borderRadius:"50%",background:si>=i?s.color:C.border,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:9,boxShadow:si===i?`0 0 0 3px ${s.color}22`:"none",transition:"all .4s"}}>
              {si>=i?<span style={{color:"#fff",fontSize:9}}>✓</span>:<span style={{opacity:.3}}>○</span>}
            </div>
            {i<steps.length-1&&<div style={{flex:1,height:2,borderRadius:2,background:si>i?steps[i+1].color:C.border,transition:"background .5s"}}/>}
          </div>
        ))}
      </div>
      {(o.status==="new"||o.status==="making")&&o.readyAt&&!isPickup&&(()=>{
        const mins=Math.max(1,Math.ceil((o.readyAt-Date.now())/60000));
        const late=o.readyAt-Date.now()<=0;
        return(

                    <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0}}>

                      <button onClick={()=>setProductPop(p.id,!p.pop)} aria-label={p.pop?"Beliebt entfernen":"Als Beliebt markieren"} title={p.pop?"Beliebt entfernen":"Als Beliebt markieren"} style={{background:p.pop?"#FEF3C7":C.surface2,color:p.pop?"#D97706":C.textLight,borderRadius:DS.radius.sm,padding:"5px 8px",fontSize:14,border:`1.5px solid ${p.pop?"#FDE68A":C.border}`,cursor:"pointer"}}>⭐</button>
                      <button onClick={()=>{setEditId(p.id);setEditData({name:p.name,prices:p.sizes.map(s=>String(s.p)),emoji:p.emoji,tag:p.tag||"",img:p.img||"",cat:p.cat,desc:p.desc||"",milch:!!p.milch,sirup:!!p.sirup,pop:!!p.pop});}} aria-label="Produkt bearbeiten" style={{background:C.surface2,borderRadius:DS.radius.sm,padding:"5px 8px",fontSize:13,border:"none",cursor:"pointer",color:C.textMid}}>✏️</button>
                      <button onClick={()=>setProductAvailable(p.id,!p.available)} style={{background:p.available?C.light:C.surface2,color:p.available?C.primary:C.textLight,borderRadius:DS.radius.sm,padding:"5px 9px",fontSize:11,fontWeight:700,border:`1.5px solid ${p.available?C.primary:C.border}`,cursor:"pointer",whiteSpace:"nowrap"}}>{p.available?"✓ Aktiv":"Pausiert"}</button>
                      {p.id>100&&(delConfId===p.id
                        ?<div style={{display:"flex",gap:4,alignItems:"center"}}>
                            <button onClick={()=>{deleteProduct(p.id);setDelConfId(null);}} style={{background:C.red,color:"#fff",borderRadius:DS.radius.sm,padding:"5px 9px",fontSize:11,fontWeight:700,border:"none",cursor:"pointer"}}>Löschen</button>
                            <button onClick={()=>setDelConfId(null)} style={{background:C.surface2,color:C.textMid,borderRadius:DS.radius.sm,padding:"5px 9px",fontSize:11,fontWeight:700,border:"none",cursor:"pointer"}}>Abbrechen</button>
                          </div>
                        :<button onClick={()=>setDelConfId(p.id)} aria-label="Produkt löschen" style={{background:C.surface2,borderRadius:DS.radius.sm,padding:"5px 8px",fontSize:13,border:"none",cursor:"pointer",color:C.red}}>🗑</button>
                      )}
                    </div>
                  </div>
                )}
              </div>
            ]))(((base)=>{if(prodSort==="name")return[...base].sort((a,b)=>a.name.localeCompare(b.name,"de"));if(prodSort==="sold")return[...base].sort((a,b)=>(soldCounts[b.id]||0)-(soldCounts[a.id]||0));if(prodSort==="price")return[...base].sort((a,b)=>a.sizes[0].p-b.sizes[0].p);return base;})(products.filter(p=>!prodSearch||p.name.toLowerCase().includes(prodSearch.toLowerCase())||p.cat.toLowerCase().includes(prodSearch.toLowerCase()))))}
          </>
        )}
      </div>
      <BottomNav/>
    </Screen>
  );
}

/* ══════════════════════════════════════════════
   PROFILE — account + Bestellpunkte
══════════════════════════════════════════════ */
function ProfileScreen(){
  const{go,user,saveUser,push,darkMode:dk}=useApp();const C=useC();
  const[name,setName]=useState(user.name||"");
  const[avatar,setAvatar]=useState(user.avatar||"🙂");
  const[code,setCode]=useState(null);
  const pts=user.points||0;
  const tier=tierOf(pts), next=nextTierOf(pts);
  const tierPct=next?Math.min(100,Math.round(((pts-tier.min)/(next.min-tier.min))*100)):100;
  const avail=Math.floor(pts/VOUCHER_AT)-(user.vouchersUsed||0);
  const toVoucher=VOUCHER_AT-(pts%VOUCHER_AT);
  const dirty=name.trim()!==(user.name||"")||avatar!==(user.avatar||"🙂");
  const save=()=>{saveUser({name:name.trim(),avatar});push("Profil gespeichert ✓","success");};
  const redeem=()=>{if(avail<=0)return;const c="ZR-"+Math.random().toString(36).slice(2,7).toUpperCase();setCode(c);saveUser({vouchersUsed:(user.vouchersUsed||0)+1});push("Gutschein eingelöst 🎉","success",4000);};
  const memberSince=new Date(user.createdAt||Date.now()).toLocaleDateString("de-DE",{month:"long",year:"numeric"});
  return(
    <Screen>
      <div style={{background:`linear-gradient(160deg,${C.heroFrom},${C.heroTo})`,padding:"46px 18px 30px",borderBottomLeftRadius:32,borderBottomRightRadius:32,position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:-50,right:-50,width:170,height:170,borderRadius:"50%",background:"rgba(255,255,255,.05)",pointerEvents:"none"}}/>
        <div style={{display:"flex",alignItems:"center",gap:11,marginBottom:18}}>
          <BackBtn onPress={()=>go("home")}/>
          <p style={{color:"#fff",fontWeight:800,fontSize:17}}>Mein Profil</p>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:14,position:"relative"}}>
          <div style={{width:62,height:62,borderRadius:"50%",background:"rgba(255,255,255,.2)",border:"2px solid rgba(255,255,255,.4)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:32,flexShrink:0}}>{user.avatar||"🙂"}</div>
          <div style={{color:"#fff",flex:1,minWidth:0}}>
            <p style={{fontWeight:900,fontSize:20,lineHeight:1.1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{user.name||"Gast"}</p>
            <div style={{display:"inline-flex",alignItems:"center",gap:5,marginTop:6,background:"rgba(255,255,255,.18)",border:"1px solid rgba(255,255,255,.3)",borderRadius:999,padding:"3px 10px"}}>
              <span style={{fontSize:13}}>{tier.emoji}</span>
              <span style={{fontWeight:800,fontSize:12}}>{tier.name}</span>
            </div>
          </div>
        </div>
      </div>

      <div style={{padding:"16px 16px 0"}}>
        {/* Points card */}
        <div style={{background:C.surface,borderRadius:DS.radius.lg,boxShadow:DS.shadow.md(dk),padding:18,marginBottom:14}}>
          <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:3}}>
            <p style={{fontSize:38,fontWeight:900,color:C.primary,lineHeight:1}}>{pts}</p>
            <p style={{fontSize:14,fontWeight:700,color:C.textMid}}>Kaffee-Stempel</p>
          </div>
          <p style={{fontSize:12,color:C.textLight,marginBottom:14}}>{next?`Noch ${next.min-pts} bis ${next.emoji} ${next.name}`:"Höchste Stufe erreicht 👑"}</p>
          {next&&(
            <div style={{height:8,background:C.surface2,borderRadius:4,overflow:"hidden",marginBottom:16}}>
              <div style={{height:"100%",width:`${tierPct}%`,background:`linear-gradient(90deg,${C.primary},${C.accent})`,borderRadius:4,transition:"width .5s ease"}}/>
            </div>
          )}
          <div style={{background:dk?"rgba(212,168,67,.12)":"#FFFBEB",border:`1.5px solid ${dk?"rgba(212,168,67,.3)":"#FDE68A"}`,borderRadius:DS.radius.md,padding:"12px 14px",display:"flex",alignItems:"center",gap:11}}>
            <span style={{fontSize:24,flexShrink:0}}>🎁</span>
            <div style={{flex:1,minWidth:0}}>
              {avail>0
                ?<><p style={{fontWeight:800,fontSize:13,color:dk?"#FCD34D":"#B45309"}}>{avail}× Freigetränk verfügbar!</p><p style={{fontSize:11,color:dk?"#FCD34D":"#B45309",opacity:.85,marginTop:1}}>Beim Personal einlösen</p></>
                :<><p style={{fontWeight:800,fontSize:13,color:C.text}}>Nächstes Freigetränk</p><p style={{fontSize:11,color:C.textLight,marginTop:1}}>Noch {toVoucher} Getränk{toVoucher!==1?"e":""} bis gratis</p></>
              }
            </div>
            {avail>0&&<button onClick={redeem} style={{flexShrink:0,padding:"8px 14px",borderRadius:DS.radius.sm,background:C.accent,color:"#3A2A00",fontWeight:800,fontSize:12,border:"none",cursor:"pointer"}}>Einlösen</button>}
          </div>
          {code&&(
            <div style={{marginTop:11,background:dk?"rgba(16,185,129,.12)":"#ECFDF5",border:`1.5px dashed ${C.primary}`,borderRadius:DS.radius.md,padding:"11px 14px",textAlign:"center"}}>
              <p style={{fontSize:11,color:C.textMid,marginBottom:3}}>Dein Gutschein-Code – beim Personal zeigen</p>
              <p style={{fontWeight:900,fontSize:20,color:C.primary,letterSpacing:".08em",fontFamily:"monospace"}}>{code}</p>
            </div>
          )}
        </div>

        {/* Stats */}
        <div style={{display:"flex",gap:9,marginBottom:14}}>
          {[["🧾",user.totalOrders||0,"Bestellungen"],["💶",fmt(user.totalSpent||0),"Ausgegeben"],["🏅",memberSince,"Dabei seit"]].map(([ic,v,l])=>(
            <div key={l} style={{flex:1,background:C.surface,borderRadius:DS.radius.md,boxShadow:DS.shadow.sm(dk),padding:"12px 8px",textAlign:"center"}}>
              <div style={{fontSize:18,marginBottom:4}}>{ic}</div>
              <p style={{fontWeight:800,fontSize:13,color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{v}</p>
              <p style={{fontSize:10,color:C.textLight,marginTop:2}}>{l}</p>
            </div>
          ))}
        </div>

        {/* Edit profile */}
        <div style={{background:C.surface,borderRadius:DS.radius.lg,boxShadow:DS.shadow.sm(dk),padding:16,marginBottom:14}}>
          <p style={{fontWeight:800,fontSize:14,color:C.text,marginBottom:11}}>Profil bearbeiten</p>
          <p style={{fontSize:11,fontWeight:700,color:C.textLight,textTransform:"uppercase",letterSpacing:".05em",marginBottom:7}}>Name</p>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="Dein Name oder Spitzname" maxLength={24} style={{width:"100%",padding:"11px 13px",border:`1.5px solid ${C.border}`,borderRadius:DS.radius.sm,fontSize:15,background:C.surface2,color:C.text,fontFamily:"inherit",outline:"none",marginBottom:14}}/>
          <p style={{fontSize:11,fontWeight:700,color:C.textLight,textTransform:"uppercase",letterSpacing:".05em",marginBottom:8}}>Avatar</p>
          <div style={{display:"grid",gridTemplateColumns:"repeat(8,1fr)",gap:6,marginBottom:15}}>
            {AVATARS.map(a=>(
              <button key={a} onClick={()=>setAvatar(a)} style={{aspectRatio:"1",borderRadius:DS.radius.sm,border:`2px solid ${avatar===a?C.primary:C.border}`,background:avatar===a?C.light:C.surface2,fontSize:19,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>{a}</button>
            ))}
          </div>
          <button onClick={save} disabled={!dirty} style={{width:"100%",padding:"12px",background:dirty?`linear-gradient(135deg,${C.dark},${C.primary})`:C.surface2,color:dirty?"#fff":C.textLight,borderRadius:DS.radius.md,fontWeight:800,fontSize:14,border:"none",cursor:dirty?"pointer":"default",boxShadow:dirty?DS.shadow.green(dk):"none"}}>Speichern</button>
        </div>

        {/* How stamps work */}
        <div style={{background:dk?"rgba(77,182,169,.08)":C.light,borderRadius:DS.radius.md,padding:"13px 15px",marginBottom:24,display:"flex",gap:10}}>
          <span style={{fontSize:16,flexShrink:0}}>💡</span>
          <p style={{fontSize:12,color:dk?C.textMid:C.dark,lineHeight:1.5}}>Du sammelst <strong>1 Kaffee-Stempel pro Getränk</strong>. Jedes <strong>{VOUCHER_AT}. Getränk ist gratis</strong> 🤖☕</p>
        </div>
      </div>
      <BottomNav/>
    </Screen>
  );
}

/* ══════════════════════════════════════════════
   APP
══════════════════════════════════════════════ */
function App(){
  const[screen,setScreen]=useState("home");
  const[cart,setCart]=useState(()=>LS.get("zr_cart",[]));
  const[selTable,setSelTable]=useState(()=>LS.get("zr_table",null));
  const[products,setProducts]=useState(PRODUCTS_INITIAL);
  const[activeCat,setActiveCat]=useState("Alle");
  const[darkMode,setDarkMode]=useState(()=>{const v=LS.get("zr_dark",null);if(v!==null)return v;try{return!!(window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches);}catch(e){return false;}});
  const[detailProduct,setDetailProduct]=useState(null);
  const[myOrders,setMyOrders]=useState(()=>{const ids=LS.get("zr_my_orders",[]);return ids.map(id=>LS.get(`zr_order_${id}`,null)).filter(Boolean);});
  const[allOrders,setAllOrders]=useState([]);
  const[announcement,setAnnouncement]=useState(()=>LS.get("zr_announce",""));
  const[ad,setAdState]=useState(()=>LS.get("zr_ad",null));
  const[ordersPaused,setOrdersPaused]=useState(()=>LS.get("zr_paused",false));
  const[confData,setConfData]=useState(null);
  const[specialId,setSpecialIdState]=useState(()=>LS.get("zr_special",null));
  const[nextSlot,setNextSlotState]=useState(()=>LS.get("zr_slot",""));
  const[user,setUser]=useState(()=>{
    let u=LS.get("zr_user",null);
    if(!u||!u.id){u={id:genId(),name:"",avatar:"🙂",points:0,totalOrders:0,totalSpent:0,vouchersUsed:0,createdAt:Date.now()};LS.set("zr_user",u);}
    return u;
  });
  const[submitting,setSubmitting]=useState(false);
  const[prevScreen,setPrevScreen]=useState("menu");
  const[splash,setSplash]=useState(true);
  const[adminAccess,setAdminAccess]=useState(()=>LS.get("zr_admin_access",false));
  const[activeLoad,setActiveLoad]=useState(0);
  const[menuQuery,setMenuQuery]=useState("");
  const{toasts,push}=useToast();

  useEffect(()=>{const ready=myOrders.filter(o=>o.status==="ready").length;const newOrd=allOrders.filter(o=>o.status==="new").length;if(ready>0)document.title=`🔔 Bereit! – zeitraum`;else if(newOrd>0)document.title=`(${newOrd} neu) Admin – zeitraum`;else document.title="zeitraum – Café & Bar";},[myOrders,allOrders]);
  useEffect(()=>{LS.set("zr_dark",darkMode);},[darkMode]);
  useEffect(()=>{LS.set("zr_cart",cart);},[cart]);
  useEffect(()=>{selTable?LS.set("zr_table",selTable):LS.del("zr_table");},[selTable]);
  useEffect(()=>{
    const local=LS.get("zr_products");
    if(local&&local.length)setProducts(local);
    Db.get("zr_products").then(p=>{if(p&&p.length)setProducts(p);});
    Db.get("zr_announce",true).then(v=>{if(v!=null){setAnnouncement(v);LS.set("zr_announce",v);}});
    Db.get("zr_ad",true).then(v=>{if(v!=null){setAdState(v);LS.set("zr_ad",v);}});
    Db.get("zr_paused",true).then(v=>{const p=!!v;setOrdersPaused(p);p?LS.set("zr_paused",true):LS.del("zr_paused");});
    Db.get("zr_special",true).then(v=>{if(v){setSpecialIdState(v);LS.set("zr_special",v);}});
    Db.get("zr_slot",true).then(v=>{if(v!=null){setNextSlotState(v);LS.set("zr_slot",v);}});
    if("serviceWorker" in navigator){navigator.serviceWorker.register("./sw.js").catch(()=>{});}
  },[]);

  useEffect(()=>{const t=setTimeout(()=>setSplash(false),1400);return()=>clearTimeout(t);},[]);

  // Aktuelle Auslastung (offene Bestellungen) regelmäßig holen → ETA/Anzeige
  useEffect(()=>{let on=true;const tick=()=>Db.activeLoad().then(n=>{if(on)setActiveLoad(n);});tick();const t=setInterval(tick,25000);const onVis=()=>{if(document.visibilityState==="visible")tick();};document.addEventListener("visibilitychange",onVis);return()=>{on=false;clearInterval(t);document.removeEventListener("visibilitychange",onVis);};},[]);

  useEffect(()=>{
    const p=new URLSearchParams(window.location.search);
    const t=p.get("table");
    if(t&&TABLES.includes(t)){setSelTable(t);setTimeout(()=>push(`${t} erkannt ✓`,"success"),1600);}
    // Staff-only admin access via special link (…?admin=<token>); …?admin=off revokes it
    const a=p.get("admin");
    if(a===ADMIN_ACCESS_TOKEN){setAdminAccess(true);LS.set("zr_admin_access",true);setScreen("admin");setTimeout(()=>push("Admin-Zugang aktiviert 🔑","success",4000),1600);}
    else if(a==="off"){setAdminAccess(false);LS.del("zr_admin_access");setScreen("home");setTimeout(()=>push("Admin-Zugang entfernt","info",3000),1600);}
    // strip sensitive/handled params from the visible URL
    if(p.has("admin")||p.has("table")){try{history.replaceState(null,"",window.location.pathname);}catch(e){}}
  },[]);

  const go=useCallback((sc,param=null)=>{
    if(sc==="detail"||sc==="cart"){setPrevScreen(screen);}
    if(sc==="detail")setDetailProduct(param);
    if(sc==="menu"&&typeof param==="string")setActiveCat(param);
    setScreen(sc);
    window.scrollTo(0,0);
  },[screen]);

  const addToCart=useCallback((item,qty)=>{
    setCart(prev=>{
      const ex=prev.find(i=>i.ck===item.ck);
      if(ex)return prev.map(i=>i.ck===item.ck?{...i,qty:i.qty+qty}:i);
      return[...prev,{...item,qty}];
    });
    if(navigator.vibrate)navigator.vibrate(12);
    push("Hinzugefügt ✓","success");
  },[push]);

  const chQty=useCallback((ck,d)=>{
    setCart(prev=>prev.map(i=>i.ck===ck?{...i,qty:Math.max(0,i.qty+d)}:i).filter(i=>i.qty>0));
  },[]);

  const removeItem=useCallback((ck)=>setCart(prev=>prev.filter(i=>i.ck!==ck)),[]);

  const saveUser=useCallback((patch)=>{
    setUser(prev=>{const next={...prev,...patch};LS.set("zr_user",next);Db.set(`user_${next.id}`,next,true);return next;});
  },[]);

  const submitOrder=useCallback(async(note,opts)=>{
    const mode=opts?.mode==="pickup"?"pickup":"delivery";
    const custName=(opts?.name||user.name||"").trim();
    if((mode==="delivery"&&!selTable)||!custName||submitting)return;
    if(custName&&custName!==user.name)saveUser({name:custName});
    setSubmitting(true);
    try{
      const id=genId();
      const now=new Date();
      const sub=Math.round(cart.reduce((s,i)=>s+i.price*i.qty,0)*100)/100;
      const del=mode==="pickup"?0:(sub>=FREE_ABOVE?0:DEL_FEE);
      const cup=cupDeposit(cart,products,mode,opts?.cupType);
      const discount=Math.min(Math.max(0,opts?.discount||0),sub+del);
      const CAT_MIN={Kaltgetränke:1,Snacks:2,Gebäck:3,Sonstiges:2};
      const times=cart.map(it=>{const pr=products.find(x=>x.id===it.id);return CAT_MIN[pr?.cat]??5;});
      const base=times.length?Math.max(...times):5;
      const tQty=cart.reduce((s,i)=>s+i.qty,0);
      // Auslastung beim Bestellzeitpunkt einrechnen (+1 für die eigene Bestellung)
      const wait=base+(tQty>3?2:tQty>1?1:0)+loadExtraMin(activeLoad+1);
      // fortlaufende Tages-Bonnummer
      const sk="seq_"+ymd();let no=null;
      try{if(Db.enabled){const cur=(await Db.get(sk,true))||0;no=cur+1;await Db.set(sk,no,true);}else{const cur=LS.get(sk,0)||0;no=cur+1;LS.set(sk,no);}}catch(e){no=null;}
      const created=Date.now();
      const order={
        id,createdAt:created,no,
        table:mode==="pickup"?null:selTable,
        mode,
        customer:custName,
        avatar:user.avatar||"🙂",
        time:now.toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"}),
        status:"new",
        readyAt:created+wait*60000,
        items:cart.map(i=>({qty:i.qty,name:i.name,note:i.note,id:i.id,emoji:i.emoji,img:i.img,price:i.price,size:i.size})),
        tip:Math.max(0,Math.round((opts?.tip||0)*100)/100),
        total:Math.round((sub+del+cup.deposit-discount+Math.max(0,opts?.tip||0))*100)/100,
        deposit:cup.deposit,
        cups:cup.units,
        cupType:cup.type,
        voucher:discount>0?Math.round(discount*100)/100:0,
        payment:opts?.payment?(opts.payment.brand?`${opts.payment.brand} ••${opts.payment.last4}`:opts.payment.method):null,
        note:note.trim(),
      };
      const myIds=LS.get("zr_my_orders",[]);
      LS.set("zr_my_orders",[...myIds,id]);
      LS.set(`zr_order_${id}`,order);
      LS.set("zr_all_orders",[...LS.get("zr_all_orders",[]),id]);
      await Db.set(`order_${id}`,order,true);
      setMyOrders(prev=>[...prev,order]);
      setCart([]);
      const earned=drinkStamps(cart,products);
      const newPoints=(user.points||0)+earned;
      const voucherUnlocked=Math.floor(newPoints/VOUCHER_AT)>Math.floor((user.points||0)/VOUCHER_AT);
      saveUser({points:newPoints,totalOrders:(user.totalOrders||0)+1,totalSpent:Math.round(((user.totalSpent||0)+order.total)*100)/100,vouchersUsed:(user.vouchersUsed||0)+(discount>0?1:0)});
      if("Notification" in window&&Notification.permission==="default")Notification.requestPermission();
      setConfData({id:order.id,createdAt:order.createdAt,no:order.no,table:order.table,mode:order.mode,customer:order.customer,total:order.total,deposit:order.deposit,cups:order.cups,cupType:order.cupType,itemCount:tQty,wait,earned,points:newPoints,voucherUnlocked,voucher:order.voucher});
      go("conf");
    }catch(e){
      push("Fehler beim Senden – bitte nochmal versuchen","error",4000);
    }finally{
      setSubmitting(false);
    }
  },[cart,selTable,submitting,push,go,products,user,saveUser,activeLoad]);

  const syncOrders=useCallback(async()=>{
    if(Db.enabled)Db.get("zr_paused",true).then(v=>{const p=!!v;setOrdersPaused(p);p?LS.set("zr_paused",true):LS.del("zr_paused");});
    const myIds=LS.get("zr_my_orders",[]);
    if(!myIds.length)return;
    let next;
    if(Db.enabled){
      const updated=await Promise.all(myIds.map(id=>Db.get(`order_${id}`,true)));
      next=updated.filter(Boolean);
    } else {
      next=myIds.map(id=>LS.get(`zr_order_${id}`,null)).filter(Boolean);
    }
    setMyOrders(prev=>{
      const prevReadyIds=new Set(prev.filter(o=>o.status==="ready").map(o=>o.id));
      const newlyReady=next.filter(o=>o.status==="ready"&&!prevReadyIds.has(o.id));
      if(newlyReady.length>0){const o0=newlyReady[0];const pickup=o0.mode==="pickup";const nm=o0.customer?o0.customer+", ":"";const title=pickup?"🛍️ Abholbereit!":"🤖 Robert ist da!";const body=pickup?`${nm}deine Bestellung wartet an der Theke. Bitte in den nächsten Minuten abholen!`:`${nm}dein Getränk wartet vor ${o0.table}. Bitte in den nächsten Minuten abholen!`;playBell();if(navigator.vibrate)navigator.vibrate([80,40,80]);push(pickup?"🛍️ Abholbereit! Jetzt an der Theke abholen.":"🤖 Robert ist da! Getränk jetzt abholen.","success",6000);if(Notification.permission==="granted"){try{if("serviceWorker" in navigator){navigator.serviceWorker.ready.then(sw=>{if(sw.active)sw.active.postMessage({type:"ROBERT_ARRIVED",title,body});}).catch(()=>{if("Notification" in window)new Notification(title,{body,icon:"/favicon.ico"});});}else if("Notification" in window){new Notification(title,{body,icon:"/favicon.ico"});}}catch(e){}}}

      return next;
    });
  },[push]);

  const loadAdminOrders=useCallback(async()=>{
    let orders;
    if(Db.enabled){
      const orderKeys=await Db.list("order_",true);
      orders=await Promise.all(orderKeys.map(k=>Db.get(k,true)));
    } else {
      const allIds=LS.get("zr_all_orders",[]);
      orders=allIds.map(id=>LS.get(`zr_order_${id}`,null));
    }
    const sorted=orders.filter(Boolean).sort((a,b)=>b.createdAt-a.createdAt);
    setAllOrders(prev=>{
      const newNow=sorted.filter(o=>o.status==="new").length;
      const newPrev=prev.filter(o=>o.status==="new").length;
      if(newNow>newPrev)playBell();
      return sorted;
    });
  },[]);

  const setOrderStatus=useCallback(async(id,status)=>{
    const order=Db.enabled?await Db.get(`order_${id}`,true):LS.get(`zr_order_${id}`);
    if(!order)return;
    const updated={...order,status};
    if(Db.enabled) await Db.set(`order_${id}`,updated,true);
    else LS.set(`zr_order_${id}`,updated);
    setAllOrders(prev=>prev.map(o=>o.id===id?updated:o));
  },[]);

  const deleteOrder=useCallback(async(id)=>{
    if(Db.enabled) await Db.del(`order_${id}`,true);
    else{ LS.del(`zr_order_${id}`); LS.set("zr_all_orders",LS.get("zr_all_orders",[]).filter(i=>i!==id)); }
    setAllOrders(prev=>prev.filter(o=>o.id!==id));
  },[]);

  const clearAllOrders=useCallback(async()=>{
    const ids=LS.get("zr_all_orders",[]);
    ids.forEach(id=>LS.del(`zr_order_${id}`));
    LS.del("zr_all_orders");
    if(Db.enabled){const keys=await Db.list("order_",true);await Promise.all(keys.map(k=>Db.del(k,true)));}
    setAllOrders([]);
  },[]);

  const addProduct=useCallback((product)=>{
    setProducts(prev=>{const next=[...prev,product];LS.set("zr_products",next);Db.set("zr_products",next);return next;});
  },[]);

  const deleteProduct=useCallback((id)=>{
    setProducts(prev=>{const next=prev.filter(p=>p.id!==id);LS.set("zr_products",next);Db.set("zr_products",next);return next;});
  },[]);

  const setProductAvailable=useCallback((id,available)=>{
    setProducts(prev=>{const next=prev.map(p=>p.id===id?{...p,available}:p);LS.set("zr_products",next);Db.set("zr_products",next);return next;});
  },[]);
  const reopenAllProducts=useCallback(()=>{
    setProducts(prev=>{if(prev.every(p=>p.available))return prev;const next=prev.map(p=>p.available?p:{...p,available:true});LS.set("zr_products",next);Db.set("zr_products",next);return next;});
  },[]);
  const setProductPop=useCallback((id,pop)=>{
    setProducts(prev=>{const next=prev.map(p=>p.id===id?{...p,pop}:p);LS.set("zr_products",next);Db.set("zr_products",next);return next;});
  },[]);

  const editProduct=useCallback(({id,name,prices,price,emoji,tag,img,cat,desc,milch,sirup,pop})=>{
    const prArr=prices||(price?[price]:[]);
    setProducts(prev=>{const next=prev.map(p=>p.id===id?{...p,name:name||p.name,emoji:emoji||p.emoji,tag:tag!==undefined?tag:p.tag,img:img!==undefined?img:p.img,cat:cat||p.cat,desc:desc!==undefined?desc:p.desc,milch:milch!==undefined?milch:p.milch,sirup:sirup!==undefined?sirup:p.sirup,pop:pop!==undefined?pop:p.pop,sizes:p.sizes.map((s,i)=>({...s,p:parseFloat(prArr[i])||s.p}))}:p);LS.set("zr_products",next);Db.set("zr_products",next);return next;});
  },[]);

  const clearCart=useCallback(()=>setCart([]),[]);
  const saveAnnouncement=useCallback((text)=>{const v=text.trim();setAnnouncement(v);LS.set("zr_announce",v);Db.set("zr_announce",v,true);},[]);
  const saveAd=useCallback(async(adObj)=>{const v=adObj&&(adObj.title||"").trim()?{kind:adObj.kind||"sponsor",title:(adObj.title||"").trim(),text:(adObj.text||"").trim(),img:(adObj.img||"").trim(),url:(adObj.url||"").trim()}:null;setAdState(v);if(v){LS.set("zr_ad",v);await Db.set("zr_ad",v,true);}else{LS.del("zr_ad");await Db.del("zr_ad",true);}},[]);
  const setSlot=useCallback(async(time)=>{const v=time.trim();setNextSlotState(v);if(v){LS.set("zr_slot",v);await Db.set("zr_slot",v,true);}else{LS.del("zr_slot");await Db.del("zr_slot",true);}},[]);
  const togglePause=useCallback(async()=>{const next=!ordersPaused;setOrdersPaused(next);if(next){LS.set("zr_paused",true);await Db.set("zr_paused",true,true);}else{LS.del("zr_paused");await Db.del("zr_paused",true);}},[ordersPaused]);
  const setSpecial=useCallback(async(id)=>{setSpecialIdState(id);if(id){LS.set("zr_special",id);await Db.set("zr_special",id,true);}else{LS.del("zr_special");await Db.del("zr_special",true);}},[]);

  const clearDoneOrders=useCallback(()=>{
    setMyOrders(prev=>{
      const done=prev.filter(o=>o.status==="done");
      done.forEach(o=>LS.del(`zr_order_${o.id}`));
      const next=prev.filter(o=>o.status!=="done");
      LS.set("zr_my_orders",next.map(o=>o.id));
      return next;
    });
  },[]);

  const revokeAdmin=useCallback(()=>{setAdminAccess(false);LS.del("zr_admin_access");setScreen("home");},[]);

  const ctx={
    adminAccess,revokeAdmin,activeLoad,
    screen,go,prevScreen,cart,selTable,setSelTable,products,activeCat,setActiveCat,menuQuery,setMenuQuery,
    darkMode,setDarkMode,detailProduct,addToCart,chQty,removeItem,clearCart,
    submitOrder,submitting,myOrders,syncOrders,clearDoneOrders,allOrders,loadAdminOrders,
    setOrderStatus,deleteOrder,clearAllOrders,addProduct,deleteProduct,setProductAvailable,reopenAllProducts,setProductPop,editProduct,
    announcement,saveAnnouncement,
    ad,saveAd,
    nextSlot,setSlot,
    ordersPaused,togglePause,
    confData,
    specialId,setSpecial,
    user,saveUser,push,
  };

  const screens={home:HomeScreen,menu:MenuScreen,cart:CartScreen,conf:OrderConfScreen,orders:OrdersScreen,admin:AdminScreen,detail:DetailScreen,qr:QRScreen,kitchen:KitchenScreen,profile:ProfileScreen};
  // Admin/Kitchen/QR are staff-only — guests without the team link can't land there
  const staffOnly=["admin","kitchen","qr"];
  const S=(staffOnly.includes(screen)&&!adminAccess)?HomeScreen:(screens[screen]||HomeScreen);

  if(splash)return<Ctx.Provider value={ctx}><SplashScreen/></Ctx.Provider>;

  return(
    <Ctx.Provider value={ctx}>
      <ToastStack toasts={toasts}/>
      <OfflineBanner/>
      <S/>
    </Ctx.Provider>
  );
}

function OfflineBanner(){
  const[online,setOnline]=useState(typeof navigator!=="undefined"?navigator.onLine:true);
  useEffect(()=>{
    const on=()=>setOnline(true);const off=()=>setOnline(false);
    window.addEventListener("online",on);window.addEventListener("offline",off);
    return()=>{window.removeEventListener("online",on);window.removeEventListener("offline",off);};
  },[]);
  if(online)return null;
  return<div style={{position:"fixed",bottom:90,left:"50%",transform:"translateX(-50%)",zIndex:500,background:"#E53935",color:"#fff",padding:"8px 20px",borderRadius:10,fontWeight:700,fontSize:13,boxShadow:"0 4px 16px rgba(0,0,0,.35)",whiteSpace:"nowrap"}}>📵 Keine Internetverbindung</div>;
}

class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={e:null};}
  static getDerivedStateFromError(e){return{e};}
  render(){
    if(this.state.e)return(
      <div style={{minHeight:"100svh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,gap:16,background:"#F0FDF4",fontFamily:"-apple-system,sans-serif"}}>
        <div style={{fontSize:52}}>⚠️</div>
        <h2 style={{fontWeight:800,fontSize:18,color:"#1A1A1A",textAlign:"center"}}>Ups, etwas ist schief gelaufen</h2>
        <button onClick={()=>window.location.reload()} style={{padding:"12px 28px",background:"#00695C",color:"#fff",border:"none",borderRadius:12,fontWeight:700,fontSize:15,cursor:"pointer"}}>Neu laden</button>
      </div>
    );
    return this.props.children;
  }
}

    ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App/></ErrorBoundary>);
  </script>
</body>
