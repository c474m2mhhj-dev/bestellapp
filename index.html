/* ══════════════════════════════════════════════
   STORAGE
══════════════════════════════════════════════ */
const hasSt = typeof window!=="undefined" && typeof window.storage!=="undefined";
const Db = {
  set:  async(k,v,sh=false)=>{ if(!hasSt)return; try{await window.storage.set(k,JSON.stringify(v),sh)}catch(e){} },
  get:  async(k,sh=false)  =>{ if(!hasSt)return null; try{const r=await window.storage.get(k,sh);return r?JSON.parse(r.value):null}catch(e){return null} },
  list: async(p,sh=false)  =>{ if(!hasSt)return[]; try{const r=await window.storage.list(p,sh);return r?r.keys:[]}catch(e){return[]} },
  del:  async(k,sh=false)  =>{ if(!hasSt)return; try{await window.storage.delete(k,sh)}catch(e){} },
};
const LS = {
  get:(k,d=null)=>{ try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d} },
  set:(k,v)=>{ try{localStorage.setItem(k,JSON.stringify(v))}catch{} },
  del:(k)=>{ try{localStorage.removeItem(k)}catch{} },
};

function useToast(){
  const [toasts,set]=useState([]);
  const push=useCallback((msg,type="info",ms=2400)=>{
    const id=genId();
    set(p=>[...p,{id,msg,type}]);

  },[]);
  return{toasts,push};
}

/* ══════════════════════════════════════════════
   SWIPE-TO-REMOVE hook
══════════════════════════════════════════════ */
function useSwipe(onRemove){
  const [dx,setDx]=useState(0);
  const startX=useRef(null);
  const onTStart=useCallback(e=>{startX.current=e.touches[0].clientX;},[]);
  const onTMove =useCallback(e=>{
    if(startX.current===null)return;
    const d=e.touches[0].clientX-startX.current;
    if(d<0) setDx(Math.max(d,-90));
  },[]);
  const onTEnd  =useCallback(()=>{
    if(dx<-60){onRemove();setDx(0);}
    else setDx(0);
    startX.current=null;
  },[dx,onRemove]);
  return{dx,onTStart,onTMove,onTEnd};
}

  const hour=new Date().getHours();

  const activeOrds=myOrders.filter(o=>o.status!=="done");

            {!special.img&&<div style={{width:80,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:44}}>{special.emoji||"⭐"}</div>}

          </button>
        );})()}
      </div>

    </Screen>

            {label:"Ohne Milch",show:!!p.milch},

          {iq>0?`Weitere hinzufügen · ${fmt(totP)}`:`In den Warenkorb · ${fmt(totP)}`}

            <div style={{display:"flex",gap:11,overflowX:"auto",scrollbarWidth:"none",margin:"0 -18px",paddingLeft:18,paddingRight:18,paddingBottom:6}}>
              {related.map(r=>(
                <div key={r.id} onClick={()=>go("detail",r)} style={{minWidth:128,flexShrink:0,background:C.surface2,borderRadius:DS.radius.lg,overflow:"hidden",cursor:"pointer",boxShadow:DS.shadow.sm(dk)}}>
                  <PImg src={r.img} emoji={r.emoji} w={128} h={80}/>
                  <div style={{padding:"7px 10px 10px"}}>
                    <p style={{fontWeight:700,fontSize:11,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.name}</p>

          </div>
        )}
      </div>
    </Screen>
  );
}

/* ══════════════════════════════════════════════

function CartItem({item,onChQty,onRemove,onSetNote}){
  const C=useC(),{darkMode:dk}=useApp();

  const[noteOpen,setNoteOpen]=useState(!!item.note);
  return(
    <div style={{position:"relative",marginBottom:9,overflow:"hidden",borderRadius:DS.radius.md}}>
      <div style={{position:"absolute",right:0,top:0,bottom:0,width:80,background:C.red,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:22,borderRadius:DS.radius.md}}>🗑</div>
      <div onTouchStart={onTStart} onTouchMove={onTMove} onTouchEnd={onTEnd}
        style={{background:C.surface,borderRadius:DS.radius.md,padding:12,boxShadow:DS.shadow.sm(dk),transform:`translateX(${dx}px)`,transition:dx===0?"transform .25s":undefined,position:"relative",zIndex:1}}>
        <div style={{display:"flex",gap:11,alignItems:"center"}}>
          <PImg src={item.img} alt={item.name} emoji={item.emoji} w={58} h={58} r={11}/>
          <div style={{flex:1,minWidth:0}}>
            <p style={{fontWeight:700,fontSize:13,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",color:C.text}}>{item.name}</p>
            <p style={{color:C.primary,fontWeight:800,fontSize:13,marginTop:3}}>{fmt(item.price*item.qty)}</p>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
            <QtyBtn op="−" onPress={()=>onChQty(-1)} sz={32}/>
            <span style={{fontWeight:800,minWidth:16,textAlign:"center",fontSize:15,color:C.text}}>{item.qty}</span>
            <QtyBtn op="+" onPress={()=>onChQty(1)} sz={32}/>
          </div>
        </div>
        {onSetNote&&((item.note||noteOpen)
          ?<div style={{display:"flex",gap:6,alignItems:"center",marginTop:8}}>
              <input value={item.note||""} onChange={e=>onSetNote(e.target.value)} placeholder="z.B. ohne Milch, extra Zucker…" autoFocus style={{flex:1,padding:"6px 10px",border:`1.5px solid ${C.border}`,borderRadius:DS.radius.sm,fontSize:12,background:C.surface2,color:C.text,fontFamily:"inherit",outline:"none"}}/>
              <button onClick={()=>{onSetNote("");setNoteOpen(false);}} style={{background:"none",border:"none",cursor:"pointer",color:C.textLight,fontSize:16,padding:"2px 4px",lineHeight:1}}>✕</button>
            </div>
          :<button onClick={()=>setNoteOpen(true)} style={{marginTop:7,padding:"3px 10px",border:`1px solid ${C.border}`,borderRadius:DS.radius.full,fontSize:11,background:"none",cursor:"pointer",color:C.textLight,fontFamily:"inherit"}}>+ Notiz</button>
        )}
      </div>
    </div>
  );
}

function CartScreen(){
  const{go,prevScreen,cart,chQty,removeItem,setItemNote,clearCart,selTable,setSelTable,submitOrder,submitting,products,addToCart,ordersPaused,darkMode:dk}=useApp();const C=useC();
  const[note,setNote]=useState(()=>LS.get("zr_note",""));
  const[undoItem,setUndoItem]=useState(null);
  const undoRef=useRef(null);
  const handleRemove=useCallback((item)=>{clearTimeout(undoRef.current);setUndoItem({...item});removeItem(item.ck);undoRef.current=setTimeout(()=>setUndoItem(null),5000);},[removeItem]);
  useEffect(()=>{LS.set("zr_note",note);},[note]);
  const sub=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const del=sub>=FREE_ABOVE?0:DEL_FEE;
  const tot=sub+del;
  const upsell=useMemo(()=>{
    const inCart=new Set(cart.map(i=>i.id));
    const cartCats=new Set(cart.map(i=>products.find(p=>p.id===i.id)?.cat).filter(Boolean));
    return products.filter(p=>p.available&&p.pop&&!inCart.has(p.id)&&!cartCats.has(p.cat)).slice(0,3);
  },[cart,products]);
  const estWait=useMemo(()=>{
    const CAT_MIN={Kaltgetränke:1,Snacks:2,Gebäck:3,Sonstiges:2};
    const times=cart.map(it=>{const p=products.find(x=>x.id===it.id);return CAT_MIN[p?.cat]??5;});
    if(!times.length)return null;
    const base=Math.max(...times);
    const totalQty=cart.reduce((s,i)=>s+i.qty,0);
    const extra=totalQty>3?2:totalQty>1?1:0;
    return base+extra;
  },[cart,products]);

    <Screen>
      <div style={{background:`linear-gradient(135deg,${C.heroFrom},${C.heroTo})`,padding:"50px 18px 20px",borderBottomLeftRadius:28,borderBottomRightRadius:28}}>

            <p style={{color:"#fff",fontWeight:800,fontSize:17}}>Warenkorb</p>
            <p style={{color:"rgba(255,255,255,.65)",fontSize:12,marginTop:1}}>{selTable?`📍 Tisch ${selTable}`:"⚠️ Kein Tisch"}</p>

        </div>
      </div>
      <div style={{padding:"14px 16px 0"}}>
        {cart.length===0&&(
          <div style={{textAlign:"center",padding:"60px 16px 120px"}}>
            <div style={{fontSize:50,marginBottom:14}}>🛒</div>
            <h3 style={{fontSize:17,fontWeight:800,marginBottom:16,color:C.text}}>Warenkorb ist leer</h3>
            <button onClick={()=>go("menu")} style={{padding:"12px 28px",background:C.primary,color:"#fff",border:"none",borderRadius:DS.radius.md,fontWeight:700,cursor:"pointer",fontSize:15}}>Zur Speisekarte</button>
          </div>
        )}
        {cart.map(item=>(
          <CartItem key={item.ck} item={item} onChQty={d=>{if(d===-1&&item.qty===1)handleRemove(item);else chQty(item.ck,d);}} onRemove={()=>handleRemove(item)} onSetNote={n=>setItemNote(item.ck,n)}/>
        ))}
        {cart.length>0&&upsell.length>0&&(
          <div style={{marginBottom:9}}>
            <p style={{fontWeight:700,fontSize:13,color:C.text,marginBottom:8}}>✨ Das passt dazu</p>
            <div style={{display:"flex",gap:9,overflowX:"auto",scrollbarWidth:"none",margin:"0 -16px",paddingLeft:16,paddingRight:16,paddingBottom:4}}>
              {upsell.map(p=>(
                <div key={p.id} style={{minWidth:120,flexShrink:0,background:C.surface,borderRadius:DS.radius.md,overflow:"hidden",boxShadow:DS.shadow.sm(dk),cursor:"pointer"}} onClick={()=>go("detail",p)}>
                  <PImg src={p.img} emoji={p.emoji} w={120} h={72}/>
                  <div style={{padding:"6px 9px 9px"}}>
                    <p style={{fontWeight:700,fontSize:11,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</p>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:4}}>
                      <span style={{fontSize:11,fontWeight:800,color:C.primary}}>{fmt(p.sizes[0].p)}</span>
                      <button onClick={e=>{e.stopPropagation();addToCart({id:p.id,name:p.name,price:p.sizes[0].p,img:p.img,emoji:p.emoji,note:"",ck:`${p.id}||${p.sizes[0].p.toFixed(2)}`},1);}} style={{width:24,height:24,borderRadius:"50%",background:C.primary,color:"#fff",border:"none",cursor:"pointer",fontSize:14,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>+</button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
        {cart.length>0&&(
          <>
            {!selTable&&(
              <div style={{background:dk?"rgba(251,192,45,.1)":"#FFF7ED",border:`2px solid ${dk?C.amber+"55":"#FED7AA"}`,borderRadius:DS.radius.md,padding:14,marginBottom:9}}>
                <p style={{fontWeight:700,fontSize:13,color:dk?C.amber:"#C2410C",marginBottom:9}}>⚠️ Bitte Tisch wählen</p>
                <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
                  {TABLES.map(t=><button key={t} onClick={()=>setSelTable(t)} style={{padding:"8px 13px",borderRadius:DS.radius.sm,background:C.surface2,color:C.text,fontWeight:700,fontSize:13,border:"none",cursor:"pointer",minHeight:42}}>{t}</button>)}
                </div>
              </div>
            )}
            <div style={{background:C.surface,borderRadius:DS.radius.md,boxShadow:DS.shadow.sm(dk),padding:15,marginBottom:9}}>
              <p style={{fontWeight:700,fontSize:13,marginBottom:7,color:C.text}}>📝 Bestellnotiz</p>
              <textarea value={note} onChange={e=>setNote(e.target.value)} placeholder="Allergien, besondere Wünsche…" style={{width:"100%",padding:"10px 12px",border:`1.5px solid ${C.border}`,borderRadius:DS.radius.sm,fontSize:14,background:C.surface2,height:64,resize:"none",fontFamily:"inherit",outline:"none",color:C.text}}/>
            </div>
            {/* Free delivery progress */}
            {sub<FREE_ABOVE&&(
              <div style={{background:C.surface,borderRadius:DS.radius.md,boxShadow:DS.shadow.xs(dk),padding:13,marginBottom:9}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
                  <p style={{fontSize:12,fontWeight:700,color:C.textMid}}>🎁 Noch {fmt(FREE_ABOVE-sub)} bis Servicegebühr entfällt</p>
                </div>
                <div style={{height:5,background:C.surface2,borderRadius:3,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${(sub/FREE_ABOVE)*100}%`,background:`linear-gradient(90deg,${C.primary},${C.accent})`,borderRadius:3,transition:"width .4s ease"}}/>
                </div>
              </div>
            )}
            <div style={{background:C.surface,borderRadius:DS.radius.md,boxShadow:DS.shadow.sm(dk),padding:15,marginBottom:9}}>
              {[["Zwischensumme",fmt(sub)],["Servicegebühr",del===0?"Entfällt 🎉":fmt(del)]].map(([l,v])=>(
                <div key={l} style={{display:"flex",justifyContent:"space-between",fontSize:13,color:C.textMid,marginBottom:7}}>
                  <span>{l}</span>
                  <span style={{fontWeight:600,color:l==="Servicegebühr"&&del===0?C.primary:C.text}}>{v}</span>
                </div>
              ))}
              <div style={{borderTop:`1px solid ${C.border}`,paddingTop:9,display:"flex",justifyContent:"space-between",fontWeight:800,fontSize:17}}>

            <button onClick={()=>!ordersPaused&&submitOrder(note)} disabled={!selTable||submitting||ordersPaused} style={{width:"100%",padding:"18px",background:!selTable||submitting||ordersPaused?C.border:`linear-gradient(135deg,${C.dark},${C.primary})`,color:!selTable||submitting||ordersPaused?C.textLight:"#fff",borderRadius:DS.radius.lg,fontWeight:800,fontSize:17,border:"none",cursor:!selTable||submitting||ordersPaused?"default":"pointer",boxShadow:selTable&&!submitting&&!ordersPaused?DS.shadow.green(dk):"none",transition:"all .2s",letterSpacing:"0.01em",marginBottom:10}}>
              {submitting?"Wird gesendet…":ordersPaused?"Bestellungen pausiert":selTable?`Jetzt bestellen · ${fmt(tot)}`:"Bitte zuerst Tisch wählen"}
            </button>
            <p style={{textAlign:"center",fontSize:11,color:C.textLight,marginBottom:32}}>Bezahlung am Tisch · Keine Vorauszahlung</p>

        <div style={{position:"fixed",bottom:72,left:"50%",transform:"translateX(-50%)",background:"#1A1A1A",color:"#fff",borderRadius:14,padding:"11px 14px",display:"flex",alignItems:"center",gap:12,zIndex:999,boxShadow:"0 8px 24px rgba(0,0,0,.35)",width:"min(92vw,360px)",animation:"tIn .25s cubic-bezier(.34,1.56,.64,1) both"}}>
          <p style={{flex:1,fontSize:13,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{undoItem.name} entfernt</p>

/* ══════════════════════════════════════════════
   ORDER TRACKING
══════════════════════════════════════════════ */
const STEPS=[
  {key:"new",    label:"Bestätigt",      icon:"✅",color:"#00695C"},
  {key:"making", label:"In Zubereitung", icon:"👨‍🍳",color:"#F59E0B"},
  {key:"ready",  label:"Bereit",         icon:"🔔",color:"#2563EB"},
  {key:"done",   label:"Serviert ✓",    icon:"🎉",color:"#16A34A"},
];
function OrderCard({o}){
  const C=useC(),{darkMode:dk,addToCart,go,products}=useApp();
  const reorder=useCallback(()=>{
    o.items.forEach(it=>{
      const prod=products.find(p=>p.id===it.id)||products.find(p=>p.name===it.name);
      if(prod&&prod.available){const sz=prod.sizes.find(s=>s.l===it.size)||prod.sizes[0];for(let i=0;i<it.qty;i++)addToCart(prod,sz);}
    });
    go("cart");
  },[o,products,addToCart,go]);
  const si=Math.max(0,STEPS.findIndex(s=>s.key===o.status));
  const step=STEPS[si];
  const pct=(si/(STEPS.length-1))*100;
  return(
    <div style={{background:C.surface,borderRadius:DS.radius.xl,padding:16,marginBottom:12,boxShadow:DS.shadow.md(dk),animation:o.status==="ready"?"pulse 1.8s ease-in-out infinite":undefined}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:13}}>
        <div style={{flex:1}}>
          <p style={{fontWeight:800,fontSize:15,color:C.text}}>Bestellung #{String(o.createdAt).slice(-4)}</p>
          <p style={{fontSize:12,color:C.textLight,marginTop:2}}>Tisch {o.table} · {o.time}</p>
          {o.note&&<p style={{fontSize:11,background:C.surface2,borderRadius:7,padding:"3px 8px",marginTop:5,display:"inline-block",color:C.textMid}}>📝 {o.note}</p>}
        </div>
        <div style={{textAlign:"center",background:`${step.color}18`,borderRadius:14,padding:"9px 13px",flexShrink:0,marginLeft:11}}>
          <div style={{fontSize:22}}>{step.icon}</div>
          <div style={{fontSize:10,fontWeight:800,color:step.color,marginTop:3,whiteSpace:"nowrap"}}>{step.label}</div>
        </div>
      </div>
      {/* Gradient progress bar */}
      <div style={{marginBottom:10}}>
        <div style={{height:5,background:C.surface2,borderRadius:3,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${pct}%`,background:`linear-gradient(90deg,${STEPS[0].color},${step.color})`,borderRadius:3,transition:"width .8s ease"}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
          {STEPS.map((s,i)=><span key={s.key} style={{fontSize:9,fontWeight:700,color:si>=i?s.color:C.textLight,transition:"color .4s"}}>{s.label.split(" ")[0]}</span>)}
        </div>
      </div>
      {/* Dot stepper */}
      <div style={{display:"flex",alignItems:"center",marginBottom:11}}>
        {STEPS.map((s,i)=>(
          <div key={s.key} style={{display:"flex",alignItems:"center",flex:i<STEPS.length-1?1:"auto"}}>
            <div style={{width:24,height:24,borderRadius:"50%",background:si>=i?s.color:C.border,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:9,boxShadow:si===i?`0 0 0 3px ${s.color}22`:"none",transition:"all .4s"}}>
              {si>=i?<span style={{color:"#fff",fontSize:9}}>✓</span>:<span style={{opacity:.3}}>○</span>}
            </div>
            {i<STEPS.length-1&&<div style={{flex:1,height:2,borderRadius:2,background:si>i?STEPS[i+1].color:C.border,transition:"background .5s"}}/>}
          </div>
        ))}
      </div>
      <div style={{paddingTop:9,borderTop:`1px solid ${C.border}`}}>
        <div style={{display:"flex",flexWrap:"wrap",gap:4,alignItems:"center",marginBottom:9}}>
          {o.items.map((it,idx)=><span key={idx} style={{fontSize:12,background:C.surface2,borderRadius:7,padding:"4px 9px",color:C.textMid}}>{it.emoji?it.emoji+" ":""}{it.qty}× {it.name}{it.note?` (${it.note})`:""}</span>)}
          <span style={{marginLeft:"auto",fontWeight:800,color:C.primary,fontSize:14}}>{fmt(o.total)}</span>
        </div>
        <button onClick={reorder} style={{width:"100%",padding:"9px",background:C.surface2,color:C.textMid,borderRadius:DS.radius.sm,fontWeight:700,fontSize:12,border:`1px solid ${C.border}`,cursor:"pointer"}}>🔁 Nochmal bestellen</button>
      </div>
    </div>
  );
}

                        <button key={k} onClick={()=>setEditData(d=>({...d,[k]:!d[k]}))} style={{flex:1,padding:"7px",borderRadius:DS.radius.sm,fontSize:12,fontWeight:700,border:`1.5px solid ${editData[k]?C.primary:C.border}`,background:editData[k]?C.light:C.surface2,color:editData[k]?C.primary:C.textMid,cursor:"pointer"}}>{l} {editData[k]?"✓":"–"}</button>
                      ))}
                    </div>
                    <div style={{display:"flex",gap:7}}>
                      <button onClick={()=>{editProduct({id:p.id,...editData});setEditId(null);}} style={{flex:1,padding:"9px",background:`linear-gradient(135deg,${C.dark},${C.primary})`,color:"#fff",borderRadius:DS.radius.sm,fontWeight:700,fontSize:13,border:"none",cursor:"pointer"}}>Speichern</button>
                      <button onClick={()=>setEditId(null)} style={{padding:"9px 13px",background:C.surface2,color:C.textMid,borderRadius:DS.radius.sm,fontWeight:700,fontSize:13,border:"none",cursor:"pointer"}}>✕</button>
                    </div>
                  </div>
                ):(
                  <div style={{background:C.surface,borderRadius:DS.radius.md,padding:12,display:"flex",gap:10,alignItems:"center",boxShadow:DS.shadow.xs(dk),opacity:p.available?1:.5}}>
                    <PImg src={p.img} emoji={p.emoji} w={36} h={36} r={8}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <p style={{fontWeight:700,fontSize:13,color:C.text}}>{p.name}</p>
                        {soldCounts[p.id]>0&&<span style={{fontSize:9,fontWeight:800,background:C.light,color:C.primary,borderRadius:DS.radius.full,padding:"1px 6px",whiteSpace:"nowrap"}}>{soldCounts[p.id]}× heute</span>}
                      </div>
                      <p style={{fontSize:11,color:C.textLight,marginTop:1}}>{p.cat} · {p.sizes.map(s=>`${s.l} ${fmt(s.p)}`).join(", ")}</p>
                    </div>
                    <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
                      <button onClick={()=>setSpecial(specialId===p.id?null:p.id)} title={specialId===p.id?"Tagesspecial entfernen":"Als Tagesspecial setzen"} style={{background:specialId===p.id?"#FFF7ED":C.surface2,color:specialId===p.id?"#C2410C":C.textLight,borderRadius:DS.radius.sm,padding:"5px 8px",fontSize:14,border:`1.5px solid ${specialId===p.id?"#FED7AA":C.border}`,cursor:"pointer"}}>🌟</button>
                      <button onClick={()=>setProductPop(p.id,!p.pop)} aria-label={p.pop?"Beliebt entfernen":"Als Beliebt markieren"} title={p.pop?"Beliebt entfernen":"Als Beliebt markieren"} style={{background:p.pop?"#FEF3C7":C.surface2,color:p.pop?"#D97706":C.textLight,borderRadius:DS.radius.sm,padding:"5px 8px",fontSize:14,border:`1.5px solid ${p.pop?"#FDE68A":C.border}`,cursor:"pointer"}}>⭐</button>
                      <button onClick={()=>{setEditId(p.id);setEditData({name:p.name,prices:p.sizes.map(s=>String(s.p)),emoji:p.emoji,tag:p.tag||"",img:p.img||"",cat:p.cat,desc:p.desc||"",milch:!!p.milch,sirup:!!p.sirup,pop:!!p.pop});}} aria-label="Produkt bearbeiten" style={{background:C.surface2,borderRadius:DS.radius.sm,padding:"5px 8px",fontSize:13,border:"none",cursor:"pointer",color:C.textMid}}>✏️</button>
                      <button onClick={()=>setProductAvailable(p.id,!p.available)} style={{background:p.available?C.light:C.surface2,color:p.available?C.primary:C.textLight,borderRadius:DS.radius.sm,padding:"5px 9px",fontSize:11,fontWeight:700,border:`1.5px solid ${p.available?C.primary:C.border}`,cursor:"pointer",whiteSpace:"nowrap"}}>{p.available?"✓ Aktiv":"Pausiert"}</button>
                      {p.id>100&&(delConfId===p.id
                        ?<div style={{display:"flex",gap:4,alignItems:"center"}}>
                            <button onClick={()=>{deleteProduct(p.id);setDelConfId(null);}} style={{background:C.red,color:"#fff",borderRadius:DS.radius.sm,padding:"5px 9px",fontSize:11,fontWeight:700,border:"none",cursor:"pointer"}}>Löschen</button>
                            <button onClick={()=>setDelConfId(null)} style={{background:C.surface2,color:C.textMid,borderRadius:DS.radius.sm,padding:"5px 9px",fontSize:11,fontWeight:700,border:"none",cursor:"pointer"}}>Abbrechen</button>
                          </div>
                        :<button onClick={()=>setDelConfId(p.id)} aria-label="Produkt löschen" style={{background:C.surface2,borderRadius:DS.radius.sm,padding:"5px 8px",fontSize:13,border:"none",cursor:"pointer",color:C.red}}>🗑</button>
                      )}
                    </div>
                  </div>
                )}
              </div>
            ]))(((base)=>{if(prodSort==="name")return[...base].sort((a,b)=>a.name.localeCompare(b.name,"de"));if(prodSort==="sold")return[...base].sort((a,b)=>(soldCounts[b.id]||0)-(soldCounts[a.id]||0));if(prodSort==="price")return[...base].sort((a,b)=>a.sizes[0].p-b.sizes[0].p);return base;})(products.filter(p=>!prodSearch||p.name.toLowerCase().includes(prodSearch.toLowerCase())||p.cat.toLowerCase().includes(prodSearch.toLowerCase()))))}
          </>
        )}
      </div>
      <BottomNav/>
    </Screen>
  );
}

/* ══════════════════════════════════════════════
   APP
══════════════════════════════════════════════ */
function App(){
  const[screen,setScreen]=useState("home");
  const[cart,setCart]=useState(()=>LS.get("zr_cart",[]));
  const[selTable,setSelTable]=useState(()=>LS.get("zr_table",null));
  const[products,setProducts]=useState(PRODUCTS_INITIAL);
  const[activeCat,setActiveCat]=useState("Alle");
  const[darkMode,setDarkMode]=useState(()=>LS.get("zr_dark",false));
  const[detailProduct,setDetailProduct]=useState(null);
  const[myOrders,setMyOrders]=useState(()=>{const ids=LS.get("zr_my_orders",[]);return ids.map(id=>LS.get(`zr_order_${id}`,null)).filter(Boolean);});
  const[allOrders,setAllOrders]=useState([]);
  const[serviceCalls,setServiceCalls]=useState([]);
  const[announcement,setAnnouncement]=useState(()=>LS.get("zr_announce",""));
  const[ordersPaused,setOrdersPaused]=useState(()=>LS.get("zr_paused",false));
  const[confData,setConfData]=useState(null);
  const[specialId,setSpecialIdState]=useState(()=>LS.get("zr_special",null));
  const[submitting,setSubmitting]=useState(false);
  const[prevScreen,setPrevScreen]=useState("menu");
  const[splash,setSplash]=useState(true);
  const{toasts,push}=useToast();

  useEffect(()=>{const ready=myOrders.filter(o=>o.status==="ready").length;const newOrd=allOrders.filter(o=>o.status==="new").length;const svc=serviceCalls.length;if(ready>0)document.title=`🔔 Bereit! – zeitraum`;else if(newOrd>0||svc>0){const p=[];if(newOrd>0)p.push(`${newOrd} neu`);if(svc>0)p.push(`${svc} 🔔`);document.title=`(${p.join(", ")}) Admin – zeitraum`;}else document.title="zeitraum – Café & Bar";},[myOrders,allOrders,serviceCalls]);
  useEffect(()=>{LS.set("zr_dark",darkMode);},[darkMode]);
  useEffect(()=>{LS.set("zr_cart",cart);},[cart]);
  useEffect(()=>{selTable?LS.set("zr_table",selTable):LS.del("zr_table");},[selTable]);
  useEffect(()=>{
    const local=LS.get("zr_products");
    if(local&&local.length)setProducts(local);
    Db.get("zr_products").then(p=>{if(p&&p.length)setProducts(p);});
    Db.get("zr_announce",true).then(v=>{if(v!=null){setAnnouncement(v);LS.set("zr_announce",v);}});
    Db.get("zr_paused",true).then(v=>{const p=!!v;setOrdersPaused(p);p?LS.set("zr_paused",true):LS.del("zr_paused");});
    Db.get("zr_special",true).then(v=>{if(v){setSpecialIdState(v);LS.set("zr_special",v);}});
  },[]);

  useEffect(()=>{const t=setTimeout(()=>setSplash(false),1400);return()=>clearTimeout(t);},[]);

  useEffect(()=>{
    const p=new URLSearchParams(window.location.search);
    const t=p.get("table");
    if(t&&TABLES.includes(t)){setSelTable(t);setTimeout(()=>push(`Tisch ${t} erkannt ✓`,"success"),1600);}
  },[]);

  const go=useCallback((sc,param=null)=>{
    if(sc==="detail"||sc==="cart"){setPrevScreen(screen);}
    if(sc==="detail")setDetailProduct(param);
    if(sc==="menu"&&typeof param==="string")setActiveCat(param);
    setScreen(sc);
    window.scrollTo(0,0);
  },[screen]);

  const addToCart=useCallback((item,qty)=>{
    setCart(prev=>{
      const ex=prev.find(i=>i.ck===item.ck);
      if(ex)return prev.map(i=>i.ck===item.ck?{...i,qty:i.qty+qty}:i);
      return[...prev,{...item,qty}];
    });
    if(navigator.vibrate)navigator.vibrate(12);
    push("Hinzugefügt ✓","success");
  },[push]);

  const chQty=useCallback((ck,d)=>{
    setCart(prev=>prev.map(i=>i.ck===ck?{...i,qty:Math.max(0,i.qty+d)}:i).filter(i=>i.qty>0));
  },[]);

  const removeItem=useCallback((ck)=>setCart(prev=>prev.filter(i=>i.ck!==ck)),[]);
  const setItemNote=useCallback((ck,note)=>setCart(prev=>prev.map(i=>i.ck===ck?{...i,note}:i)),[]);

  const submitOrder=useCallback(async(note)=>{
    if(!selTable||submitting)return;
    setSubmitting(true);
    try{
      const id=genId();
      const now=new Date();
      const sub=Math.round(cart.reduce((s,i)=>s+i.price*i.qty,0)*100)/100;
      const del=sub>=FREE_ABOVE?0:DEL_FEE;
      const order={
        id,createdAt:Date.now(),
        table:selTable,
        time:now.toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"}),
        status:"new",
        items:cart.map(i=>({qty:i.qty,name:i.name,note:i.note,id:i.id,emoji:i.emoji,img:i.img,price:i.price,size:i.size})),
        total:Math.round((sub+del)*100)/100,
        note:note.trim(),
      };
      const myIds=LS.get("zr_my_orders",[]);
      LS.set("zr_my_orders",[...myIds,id]);
      LS.set(`zr_order_${id}`,order);
      LS.set("zr_all_orders",[...LS.get("zr_all_orders",[]),id]);
      await Db.set(`order_${id}`,order,true);
      setMyOrders(prev=>[...prev,order]);
      const CAT_MIN={Kaltgetränke:1,Snacks:2,Gebäck:3,Sonstiges:2};
      const times=cart.map(it=>{const pr=products.find(x=>x.id===it.id);return CAT_MIN[pr?.cat]??5;});
      const base=times.length?Math.max(...times):5;
      const tQty=cart.reduce((s,i)=>s+i.qty,0);
      const wait=base+(tQty>3?2:tQty>1?1:0);
      setCart([]);
      LS.del("zr_note");
      if("Notification" in window&&Notification.permission==="default")Notification.requestPermission();
      setConfData({id:order.id,createdAt:order.createdAt,table:order.table,total:order.total,itemCount:tQty,wait});
      go("conf");
    }catch(e){
      push("Fehler beim Senden – bitte nochmal versuchen","error",4000);
    }finally{
      setSubmitting(false);
    }
  },[cart,selTable,submitting,push,go,products]);

  const syncOrders=useCallback(async()=>{
    if(hasSt)Db.get("zr_paused",true).then(v=>{const p=!!v;setOrdersPaused(p);p?LS.set("zr_paused",true):LS.del("zr_paused");});
    const myIds=LS.get("zr_my_orders",[]);
    if(!myIds.length)return;
    let next;
    if(hasSt){
      const updated=await Promise.all(myIds.map(id=>Db.get(`order_${id}`,true)));
      next=updated.filter(Boolean);
    } else {
      next=myIds.map(id=>LS.get(`zr_order_${id}`,null)).filter(Boolean);
    }
    setMyOrders(prev=>{
      const prevReadyIds=new Set(prev.filter(o=>o.status==="ready").map(o=>o.id));
      const newlyReady=next.filter(o=>o.status==="ready"&&!prevReadyIds.has(o.id));
      if(newlyReady.length>0){playBell();if(navigator.vibrate)navigator.vibrate([80,40,80]);push(`🔔 Deine Bestellung ist bereit!`,"success",5000);if("Notification" in window&&Notification.permission==="granted"){try{new Notification("🔔 Deine Bestellung ist bereit!",{body:`Tisch ${newlyReady[0].table} – jetzt abholen!`,icon:"/favicon.ico"});}catch(e){}}}

      return next;
    });
  },[push]);

  const requestService=useCallback(async(type="service")=>{
    if(!selTable)return;
    const ts=Date.now();
    const key=`svc_${selTable}_${ts}`;
    const call={key,table:selTable,ts,type,time:new Date().toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"})};
    if(hasSt)await Db.set(key,call,true);
    else{const svcList=LS.get("zr_svc_list",[]);LS.set("zr_svc_list",[...svcList,key]);LS.set(key,call);}
    LS.set(`zr_svc_last_${type}_${selTable}`,ts);
    push(type==="zahlen"?"Zahlung angefordert ✓":"Bedienung gerufen ✓","success",4000);
    if(navigator.vibrate)navigator.vibrate([30,15,30]);
  },[selTable,push]);

  const dismissServiceCall=useCallback(async(key)=>{
    if(hasSt)await Db.del(key,true);
    else{LS.del(key);LS.set("zr_svc_list",LS.get("zr_svc_list",[]).filter(k=>k!==key));}
    setServiceCalls(prev=>prev.filter(c=>c.key!==key));
  },[]);

  const loadAdminOrders=useCallback(async()=>{
    let orders,svcs=[];
    if(hasSt){
      const[orderKeys,svcKeys]=await Promise.all([Db.list("order_",true),Db.list("svc_",true)]);
      const[orderData,svcData]=await Promise.all([Promise.all(orderKeys.map(k=>Db.get(k,true))),Promise.all(svcKeys.map(k=>Db.get(k,true)))]);
      orders=orderData;svcs=svcData.filter(Boolean);
    } else {
      const allIds=LS.get("zr_all_orders",[]);
      orders=allIds.map(id=>LS.get(`zr_order_${id}`,null));
      svcs=LS.get("zr_svc_list",[]).map(k=>LS.get(k,null)).filter(Boolean);
    }
    setServiceCalls(prev=>{if(svcs.length>prev.length)playChime();return svcs;});
    const sorted=orders.filter(Boolean).sort((a,b)=>b.createdAt-a.createdAt);
    setAllOrders(prev=>{
      const newNow=sorted.filter(o=>o.status==="new").length;
      const newPrev=prev.filter(o=>o.status==="new").length;
      if(newNow>newPrev)playBell();
      return sorted;
    });
  },[]);

  const setOrderStatus=useCallback(async(id,status)=>{
    const order=hasSt?await Db.get(`order_${id}`,true):LS.get(`zr_order_${id}`);
    if(!order)return;
    const updated={...order,status};
    if(hasSt) await Db.set(`order_${id}`,updated,true);
    else LS.set(`zr_order_${id}`,updated);
    setAllOrders(prev=>prev.map(o=>o.id===id?updated:o));
  },[]);

  const deleteOrder=useCallback(async(id)=>{
    if(hasSt) await Db.del(`order_${id}`,true);
    else{ LS.del(`zr_order_${id}`); LS.set("zr_all_orders",LS.get("zr_all_orders",[]).filter(i=>i!==id)); }
    setAllOrders(prev=>prev.filter(o=>o.id!==id));
  },[]);

  const clearAllOrders=useCallback(async()=>{
    const ids=LS.get("zr_all_orders",[]);
    ids.forEach(id=>LS.del(`zr_order_${id}`));
    LS.del("zr_all_orders");
    if(hasSt){const keys=await Db.list("order_",true);await Promise.all(keys.map(k=>Db.del(k,true)));}
    setAllOrders([]);
  },[]);

  const addProduct=useCallback((product)=>{
    setProducts(prev=>{const next=[...prev,product];LS.set("zr_products",next);Db.set("zr_products",next);return next;});
  },[]);

  const deleteProduct=useCallback((id)=>{
    setProducts(prev=>{const next=prev.filter(p=>p.id!==id);LS.set("zr_products",next);Db.set("zr_products",next);return next;});
  },[]);

  const setProductAvailable=useCallback((id,available)=>{
    setProducts(prev=>{const next=prev.map(p=>p.id===id?{...p,available}:p);LS.set("zr_products",next);Db.set("zr_products",next);return next;});
  },[]);
  const setProductPop=useCallback((id,pop)=>{
    setProducts(prev=>{const next=prev.map(p=>p.id===id?{...p,pop}:p);LS.set("zr_products",next);Db.set("zr_products",next);return next;});
  },[]);

  const editProduct=useCallback(({id,name,prices,price,emoji,tag,img,cat,desc,milch,sirup,pop})=>{
    const prArr=prices||(price?[price]:[]);
    setProducts(prev=>{const next=prev.map(p=>p.id===id?{...p,name:name||p.name,emoji:emoji||p.emoji,tag:tag!==undefined?tag:p.tag,img:img!==undefined?img:p.img,cat:cat||p.cat,desc:desc!==undefined?desc:p.desc,milch:milch!==undefined?milch:p.milch,sirup:sirup!==undefined?sirup:p.sirup,pop:pop!==undefined?pop:p.pop,sizes:p.sizes.map((s,i)=>({...s,p:parseFloat(prArr[i])||s.p}))}:p);LS.set("zr_products",next);Db.set("zr_products",next);return next;});
  },[]);

  const clearCart=useCallback(()=>setCart([]),[]);
  const saveAnnouncement=useCallback((text)=>{const v=text.trim();setAnnouncement(v);LS.set("zr_announce",v);Db.set("zr_announce",v,true);},[]);
  const togglePause=useCallback(async()=>{const next=!ordersPaused;setOrdersPaused(next);if(next){LS.set("zr_paused",true);await Db.set("zr_paused",true,true);}else{LS.del("zr_paused");await Db.del("zr_paused",true);}},[ordersPaused]);
  const setSpecial=useCallback(async(id)=>{setSpecialIdState(id);if(id){LS.set("zr_special",id);await Db.set("zr_special",id,true);}else{LS.del("zr_special");await Db.del("zr_special",true);}},[]);

  const clearDoneOrders=useCallback(()=>{
    setMyOrders(prev=>{
      const done=prev.filter(o=>o.status==="done");
      done.forEach(o=>LS.del(`zr_order_${o.id}`));
      const next=prev.filter(o=>o.status!=="done");
      LS.set("zr_my_orders",next.map(o=>o.id));
      return next;
    });
  },[]);

  const ctx={
    screen,go,prevScreen,cart,selTable,setSelTable,products,activeCat,setActiveCat,
    darkMode,setDarkMode,detailProduct,addToCart,chQty,removeItem,setItemNote,clearCart,
    submitOrder,submitting,myOrders,syncOrders,clearDoneOrders,allOrders,loadAdminOrders,
    setOrderStatus,deleteOrder,clearAllOrders,addProduct,deleteProduct,setProductAvailable,setProductPop,editProduct,
    serviceCalls,requestService,dismissServiceCall,
    announcement,saveAnnouncement,
    ordersPaused,togglePause,
    confData,
    specialId,setSpecial,
  };

  const screens={home:HomeScreen,menu:MenuScreen,cart:CartScreen,conf:OrderConfScreen,orders:OrdersScreen,admin:AdminScreen,detail:DetailScreen,qr:QRScreen,kitchen:KitchenScreen};
  const S=screens[screen]||HomeScreen;

  if(splash)return<Ctx.Provider value={ctx}><SplashScreen/></Ctx.Provider>;

  return(
    <Ctx.Provider value={ctx}>
      <ToastStack toasts={toasts}/>
      <OfflineBanner/>
      <S/>
    </Ctx.Provider>
  );
}

function OfflineBanner(){
  const[online,setOnline]=useState(typeof navigator!=="undefined"?navigator.onLine:true);
  useEffect(()=>{
    const on=()=>setOnline(true);const off=()=>setOnline(false);
    window.addEventListener("online",on);window.addEventListener("offline",off);
    return()=>{window.removeEventListener("online",on);window.removeEventListener("offline",off);};
  },[]);
  if(online)return null;
  return<div style={{position:"fixed",bottom:90,left:"50%",transform:"translateX(-50%)",zIndex:500,background:"#E53935",color:"#fff",padding:"8px 20px",borderRadius:10,fontWeight:700,fontSize:13,boxShadow:"0 4px 16px rgba(0,0,0,.35)",whiteSpace:"nowrap"}}>📵 Keine Internetverbindung</div>;
}

class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={e:null};}
  static getDerivedStateFromError(e){return{e};}
  render(){
    if(this.state.e)return(
      <div style={{minHeight:"100svh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,gap:16,background:"#F0FDF4",fontFamily:"-apple-system,sans-serif"}}>
        <div style={{fontSize:52}}>⚠️</div>
        <h2 style={{fontWeight:800,fontSize:18,color:"#1A1A1A",textAlign:"center"}}>Ups, etwas ist schief gelaufen</h2>
        <button onClick={()=>window.location.reload()} style={{padding:"12px 28px",background:"#00695C",color:"#fff",border:"none",borderRadius:12,fontWeight:700,fontSize:15,cursor:"pointer"}}>Neu laden</button>
      </div>
    );
    return this.props.children;
  }
}

    ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App/></ErrorBoundary>);
  </script>
</body>
